<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>수박 합성</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Do+Hyeon&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden; background: #000;
    font-family: 'Jua', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff; touch-action: none;
  }
  .title-font { font-family: 'Do Hyeon', 'Jua', sans-serif; }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: linear-gradient(180deg, #2a5f6b 0%, #4a8a76 55%, #6fb27a 100%);
    overflow: hidden; cursor: pointer;
  }
  /* PC 미리보기 (큰 화면)에서만 모바일 프레임 */
  @media (min-width: 500px) {
    body { display: flex; align-items: center; justify-content: center; }
    #wrap {
      width: min(420px, calc(100vh * 9 / 16));
      height: min(747px, 100vh);
      width: min(420px, calc(100dvh * 9 / 16));
      height: min(747px, 100dvh);
      border-radius: 28px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.55),
        0 0 0 4px #111,
        inset 0 0 0 1px rgba(255,255,255,0.06);
    }
  }
  canvas { display: block; position: absolute; inset: 0; pointer-events: none; }
  .hud {
    position: absolute; top: 10px; left: 14px;
    pointer-events: none; z-index: 6;
  }
  .score-box {
    font-weight: 800;
    background: rgba(0,0,0,0.42);
    padding: 6px 14px 8px;
    border-radius: 14px;
    backdrop-filter: blur(2px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    display: inline-block;
  }
  .score-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 1px; }
  .score-label { font-size: 12px; opacity: .9; min-width: 42px; color: #fff; }
  .score-value { font-size: 15px; color: #ffde59; font-weight: 700; }
  .big {
    font-size: 28px !important;
    color: #ffb800 !important;
    text-shadow: 0 2px 0 rgba(0,0,0,.5), 0 0 8px rgba(255,184,0,0.4);
    font-family: 'Do Hyeon', 'Jua', sans-serif;
    letter-spacing: 0.5px;
  }
  .next-box {
    background: rgba(0,0,0,0.25);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 6px 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .next-box span { font-size: 11px; opacity: .85; }
  .next-swatch {
    width: 28px; height: 28px; border-radius: 50%;
    box-shadow: inset -3px -5px 8px rgba(0,0,0,0.25), 0 2px 4px rgba(0,0,0,0.3);
  }
  .overlay {
    position: absolute; inset: 0; z-index: 10;
    background: rgba(0,0,0,0.7);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; backdrop-filter: blur(6px);
  }
  .overlay.show { display: flex; }
  .overlay h2 { margin: 0; font-family: 'Do Hyeon', sans-serif; font-size: 38px; color: #ffde59; text-shadow: 0 3px 0 #8a5a00; letter-spacing: 2px; }
  .overlay .final-score { font-size: 20px; }
  .overlay .final-score b { color: #ffb800; font-size: 36px; text-shadow: 0 2px 0 #5a3a00; }
  .stats-box {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 14px;
    padding: 14px 22px;
    min-width: 220px;
  }
  .stats-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 15px; }
  .stats-row .k { opacity: 0.85; }
  .stats-row .v { color: #ffd54f; font-weight: 700; }
  .btn {
    background: linear-gradient(180deg, #ffcf4a 0%, #ff9e2c 100%);
    border: 3px solid #7a4a00; color: #4a2800;
    padding: 14px 36px; border-radius: 28px;
    font-size: 20px; font-weight: 900;
    cursor: pointer; box-shadow: 0 4px 0 #7a4a00;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #7a4a00; }
  #itemBar {
    position: absolute; right: 10px; bottom: 12px;
    z-index: 8; pointer-events: none;
  }
  .item-slot {
    pointer-events: auto;
    background: linear-gradient(180deg, #fff6d5 0%, #ffcf5a 100%);
    border: 2.5px solid #7a4a00;
    border-radius: 12px;
    padding: 5px 10px;
    color: #3a2000;
    font-family: 'Jua', sans-serif;
    cursor: pointer;
    display: flex; flex-direction: row; align-items: center; gap: 8px;
    box-shadow: 0 3px 0 #7a4a00, 0 5px 12px rgba(0,0,0,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
    line-height: 1;
  }
  .item-slot:active { transform: translateY(2px); box-shadow: 0 1px 0 #7a4a00, 0 3px 6px rgba(0,0,0,0.5); }
  .item-slot .icon { font-size: 22px; line-height: 1; }
  .item-slot .desc { font-size: 13px; font-weight: 700; color: #3a2000; line-height: 1; }
  .item-slot .price-tag {
    background: #3a2000; color: #ffde59;
    padding: 4px 8px; border-radius: 10px;
    font-size: 12px; font-weight: 700;
    line-height: 1;
  }
  .item-slot.ready {
    border-color: #43a047;
    background: linear-gradient(180deg, #e8f9d5 0%, #a5dc7a 100%);
    box-shadow: 0 0 14px rgba(100,220,100,0.7), 0 3px 0 #2a6a1a;
  }
  .item-slot.ready .desc { color: #1a4a10; font-weight: 700; }
  .item-slot.active {
    border-color: #ff3d00;
    background: linear-gradient(180deg, #fff0b8 0%, #ff9e40 100%);
    box-shadow: 0 0 18px rgba(255,130,0,0.9), 0 3px 0 #a04a00;
    animation: slotPulse 0.6s infinite;
  }
  @keyframes slotPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .item-slot.used {
    opacity: 0.45; cursor: not-allowed; pointer-events: none;
    filter: grayscale(0.6);
  }
  .revive-btn {
    background: linear-gradient(180deg, #4a90e2 0%, #2a6fbf 100%);
    border: 3px solid #1a4a80; color: #fff;
    padding: 12px 24px; border-radius: 24px;
    font-family: 'Jua', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 0 #1a4a80;
    display: flex; align-items: center; gap: 8px;
  }
  .revive-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a4a80; }
  .revive-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .toast {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: #fff;
    padding: 10px 18px; border-radius: 18px;
    font-family: 'Jua', sans-serif; font-size: 14px;
    z-index: 40; pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }
  #rotateOverlay {
    position: fixed; inset: 0; z-index: 999;
    background: #000; color: #fff;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    font-family: 'Jua', sans-serif;
  }
  #rotateOverlay.show { display: flex; }
  #rotateOverlay .rotate-icon {
    font-size: 80px;
    animation: rotateHint 1.6s ease-in-out infinite;
    transform-origin: center;
  }
  #rotateOverlay .rotate-text {
    font-size: 22px; text-align: center; line-height: 1.5;
    color: #ffde59; text-shadow: 0 2px 0 rgba(0,0,0,0.5);
  }
  @keyframes rotateHint {
    0%, 15%  { transform: rotate(90deg); }
    50%      { transform: rotate(0); }
    85%, 100%{ transform: rotate(90deg); }
  }
  #muteBtn, #dexBtn {
    position: absolute; top: 12px; z-index: 20;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: #fff; border: 1.5px solid rgba(255,255,255,0.4);
    font-size: 17px; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  #muteBtn { right: 12px; }
  #dexBtn  { right: 56px; }
  #muteBtn:active, #dexBtn:active { background: rgba(0,0,0,0.8); transform: translateY(1px); }
  .dex-overlay {
    position: absolute; inset: 0; z-index: 30;
    background: rgba(0,0,0,0.75);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(6px); padding: 16px;
  }
  .dex-overlay.show { display: flex; }
  .dex-card {
    background: linear-gradient(180deg, #fff5d5 0%, #ffdc7a 100%);
    border: 4px solid #8a5a00;
    border-radius: 18px;
    padding: 18px 22px;
    max-width: 92%;
    max-height: 92%;
    overflow-y: auto;
    color: #3a2000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .dex-card h2 {
    margin: 0 0 12px; font-family: 'Do Hyeon', sans-serif;
    font-size: 26px; text-align: center; color: #8a3a00;
  }
  .dex-progress {
    font-size: 14px; text-align: center; margin-bottom: 14px; font-weight: 700;
  }
  .dex-progress .bar {
    height: 8px; background: rgba(0,0,0,0.12); border-radius: 4px; margin-top: 6px; overflow: hidden;
  }
  .dex-progress .fill {
    height: 100%; background: linear-gradient(90deg, #43a047, #8bc34a); border-radius: 4px;
    transition: width 0.3s;
  }
  .dex-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px;
  }
  .dex-cell {
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 4px;
    font-family: 'Jua', sans-serif;
    font-weight: 700; font-size: 12px; color: #3a2000;
    border: 2px solid #a87a20;
    box-shadow: inset -2px -3px 6px rgba(0,0,0,0.12);
    position: relative;
    background: #f5eac8;
    overflow: hidden;
  }
  .dex-cell .dex-sprite {
    position: absolute;
    left: 7.5%; top: 7.5%;
    width: 85%; height: 85%;
    object-fit: contain;
    z-index: 1;
    pointer-events: none;
  }
  .dex-cell.locked {
    background: #4a4a4a !important;
    border-color: #2a2a2a;
  }
  .dex-cell.locked .dex-sprite {
    /* 실루엣: 검정 그림자처럼 어둡게 */
    filter: brightness(0) opacity(0.55);
  }
  .dex-cell.locked .tier-name {
    color: rgba(255,255,255,0.65);
    background: rgba(0,0,0,0.35);
  }
  .dex-cell .tier-num {
    position: absolute; top: 3px; left: 5px;
    font-size: 10px; opacity: 0.75; color: #6a4810;
    background: rgba(255,255,255,0.5);
    padding: 1px 4px; border-radius: 6px;
    z-index: 2;
  }
  .dex-cell.locked .tier-num { color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.4); }
  .dex-cell .tier-name {
    position: relative; z-index: 2;
    background: rgba(255,255,255,0.75);
    padding: 1px 6px; border-radius: 8px;
    font-size: 11px;
  }
  .dex-close {
    display: block; margin: 0 auto;
    background: linear-gradient(180deg, #ffcf4a 0%, #ff9e2c 100%);
    border: 3px solid #7a4a00; color: #4a2800;
    padding: 8px 24px; border-radius: 20px;
    font-family: 'Jua', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; box-shadow: 0 3px 0 #7a4a00;
  }
  .tutorial-overlay {
    position: absolute; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.7);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .tutorial-overlay.show { display: flex; }
  .tutorial-card {
    background: linear-gradient(180deg, #fff5d5 0%, #ffdc7a 100%);
    border: 4px solid #8a5a00;
    border-radius: 20px;
    padding: 24px 28px;
    max-width: 80%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
    color: #3a2000;
  }
  .tutorial-card h2 { margin: 0 0 16px; font-size: 26px; color: #8a3a00; }
  .tutorial-card p { margin: 10px 0; font-size: 15px; font-weight: 600; line-height: 1.5; }
  .tutorial-card button {
    margin-top: 16px;
    background: linear-gradient(180deg, #ffcf4a 0%, #ff9e2c 100%);
    border: 3px solid #7a4a00; color: #4a2800;
    padding: 10px 28px; border-radius: 22px;
    font-size: 16px; font-weight: 900;
    cursor: pointer; box-shadow: 0 3px 0 #7a4a00;
  }
  .tutorial-card button:active { transform: translateY(1px); box-shadow: 0 2px 0 #7a4a00; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="score-box">
      <div class="score-row"><span class="score-label">P</span><span class="score-value big" id="score">0</span></div>
      <div class="score-row"><span class="score-label">최고P</span><span class="score-value" id="best">0</span></div>
    </div>
  </div>

  <div class="tutorial-overlay" id="tutorial">
    <div class="tutorial-card">
      <h2>🍉 수박 합성</h2>
      <p>👆 화면을 탭해서 과일을 떨어뜨려요</p>
      <p>🍒 같은 과일 2개가 만나면 다음 단계로 합쳐져요</p>
      <p>🏆 마지막엔 감자를 만들어 최고 점수 갱신!</p>
      <p>🚨 빨간 선 위로 쌓이지 않게 조심</p>
      <button id="tutorialClose">시작하기</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <h2>게임 오버</h2>
    <div class="final-score"><b id="finalScore">0</b></div>
    <div class="stats-box">
      <div class="stats-row"><span class="k">🔀 합체 횟수</span><span class="v" id="statMerges">0</span></div>
      <div class="stats-row"><span class="k">🔥 최고 콤보</span><span class="v" id="statCombo">0</span></div>
      <div class="stats-row"><span class="k">🏆 최고 과일</span><span class="v" id="statTier">-</span></div>
      <div class="stats-row"><span class="k">⏱️ 플레이 시간</span><span class="v" id="statTime">0초</span></div>
    </div>
    <button class="revive-btn" id="reviveBtn">📺 광고 보고 이어하기</button>
    <button class="btn" id="restartBtn">다시 도전</button>
  </div>

  <!-- 하단 우측 아이템 바 -->
  <div id="itemBar">
    <div class="item-slot" id="potionSlot">
      <span class="icon">🧪</span>
      <span class="desc" id="potionDesc">한 개 진화</span>
      <span class="price-tag" id="potionPrice">💎 2</span>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <!-- 세로모드 강제 안내 -->
  <div id="rotateOverlay">
    <div class="rotate-icon">📱</div>
    <div class="rotate-text">세로 모드로<br>돌려주세요</div>
  </div>

  <button id="muteBtn" title="소리 켜기/끄기">🔊</button>
  <button id="dexBtn" title="도감">📖</button>
  <div class="dex-overlay" id="dexOverlay">
    <div class="dex-card">
      <h2>🌳 과일 도감 🌳</h2>
      <div class="dex-progress">
        달성 <span id="dexCount">0</span> / <span id="dexTotal">11</span>
        <div class="bar"><div class="fill" id="dexFill" style="width:0%"></div></div>
      </div>
      <div class="dex-grid" id="dexGrid"></div>
      <button class="dex-close" id="dexClose">닫기</button>
    </div>
  </div>
</div>

<script>
"use strict";

// 전역 에러 표시 (원인 파악용)
window.addEventListener('error', (ev) => {
  const d = document.getElementById('debug');
  if (d) { d.style.background = '#a00'; d.style.color = '#fff'; d.textContent = 'ERR: ' + (ev.message || ev.error); }
});

// 안전한 localStorage 래퍼 (sandboxed iframe 대비)
const safeStorage = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
};

// ============ Telegram (선택) ============
try {
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }
} catch (e) {}

// ============================================================
// 🔌 부모 앱 브릿지 — 실제 앱 SDK로 교체해야 할 부분
// ============================================================
// 개발자 주의: 아래 2개 함수 내부만 실제 앱의 다이아/광고 SDK로 교체하면 됨
window.ParentBridge = window.ParentBridge || {
  // 다이아로 아이템 구매
  async buyItem(itemType, price) {
    // TODO: 실제 앱에서 다이아 차감 API 호출
    console.log(`[stub] buyItem(${itemType}, ${price})`);
    await new Promise(r => setTimeout(r, 300));
    return { success: true };
  },
  // 광고 시청 (이어하기용)
  async watchAd(purpose) {
    // TODO: 실제 광고 SDK 호출
    console.log(`[stub] watchAd(${purpose})`);
    await new Promise(r => setTimeout(r, 1500));
    return { success: true };
  },
};

// ============ 아이템 상수/상태 ============
const POTION_PRICE = 2;       // 다이아 가격
const POTION_MAX_TIER = 6;    // 인덱스 6 = 사과. 0~6 진화 가능 → 최대 결과 배(7)
const REVIVE_MAX_TIER = 7;    // 복숭아 이하 제거 가능. 파인애플/멜론/감자 불가
const inventory = { potion: 0 };
let potionAvailable = true;   // 이번 판에 아직 구매 가능?
let potionMode = false;       // 사용 모드 (과일 탭 대기)
let reviveUsed = false;       // 이번 판에 이어하기 썼는지
let reviveMode = false;       // 이어하기 3개 선택 중
let reviveRemaining = 0;      // 남은 선택 횟수

function resetItems() {
  inventory.potion = 0;
  potionAvailable = true;
  potionMode = false;
  reviveUsed = false;
  reviveMode = false;
  reviveRemaining = 0;
}

// 스크립트 시작 확인용
try { document.getElementById('debug').textContent = 'init…'; } catch(e) {}

// ============ 과일 정의 ============
const TIERS = [
  { name: '체리',     color: '#D32F2F', r: 14,  face: 'smile'  },                          // 1단계: 빨강
  { name: '딸기',     color: '#FFEB3B', r: 20,  face: 'grin'   },                          // 2단계: 노랑 (빨강·보라와 완전 다른 계열)
  { name: '포도',     color: '#7B1FA2', r: 28,  face: 'wink-r' },                          // 3단계: 보라
  { name: '귤',       color: '#FB8C00', r: 37,  face: 'blush'  },                          // 4단계: 주황
  { name: '감',       color: '#C2185B', r: 47,  face: 'happy'  },                          // 5단계: 딥 라즈베리
  { name: '사과',     color: '#43A047', r: 56,  face: 'cat'    },                          // 초록 (청사과) [3%↓]
  { name: '배',       color: '#DCE775', color2: '#F9A825', r: 68,  face: 'tongue' },       // 연두→골드 [3%↓]
  { name: '복숭아',   color: '#FF7043', color2: '#FDD835', r: 80,  face: 'blush'  },       // 산호→노랑 [3%↓]
  { name: '파인애플', color: '#FFD54F', color2: '#E65100', r: 91,  face: 'smug'   },       // 노랑→진주황 [3%↓]
  { name: '멜론',     color: '#9CCC65', color2: '#F06292', r: 103, face: 'wink-l' },       // 연두→핫핑크 [3%↓]
  { name: '감자',     color: '#8D6E63', color2: '#EF6C00', r: 114, face: 'stoic'  },       // 갈색→주황 [3%↓]
];

// ============ 캔버스 / 렌더링 셋업 ============
const canvas = document.getElementById('game');
let ctx = canvas.getContext('2d'); // 스프라이트 렌더링 시 임시 교체용 (let)
const mainCtx = ctx; // 메인 캔버스 컨텍스트 보관
const wrap = document.getElementById('wrap');

// 실제 화면 크기 그대로 사용 (초기 버전 방식)
let W = 0, H = 0, LINE_Y = 0;
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  const wrapEl = document.getElementById('wrap');
  const rect = wrapEl.getBoundingClientRect();
  W = rect.width || window.innerWidth;
  H = rect.height || window.innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  LINE_Y = Math.max(90, Math.min(H * 0.18, 160));
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
resize();
requestAnimationFrame(resize); // CSS 적용 후 한 번 더
try {
  if ('ResizeObserver' in window) {
    new ResizeObserver(resize).observe(document.getElementById('wrap'));
  }
} catch (e) {}

// ============ 자체 물리 엔진 ============
const GRAVITY = 1800;     // px/s²
const RESTITUTION = 0;    // 반발력 (거의 제거)
const WALL_REST = 0.02;
const WALL_FRICTION = 0.32;    // 벽/바닥 마찰 (낮춤: 0.5 → 0.32)
const LINEAR_DAMP = 0.988;     // 선속도 감쇠 (완화: 0.97 → 0.988)
const ANG_DAMP = 0.93;         // 각속도 감쇠 (완화: 0.86 → 0.93)
const CONTACT_FRICTION = 0.18; // 과일끼리 접선 마찰 (낮춤: 0.45 → 0.18)
// 핸드폰 하단 곡률/홈 인디케이터 안전 영역 (논리 좌표)
const SAFE_BOTTOM = 70;
const SAFE_SIDE = 22; // 나무 트렁크 두께와 일치

let nextId = 1;
function Fruit(x, y, tier) {
  const r = TIERS[tier].r;
  const mass = Math.pow(r, 3.5);
  return {
    id: nextId++,
    x, y, vx: 0, vy: 0,
    angle: 0, va: 0,
    tier, r,
    mass, invMass: 1 / mass,
    createdAt: performance.now(),
    overLineAt: 0,
    dead: false,
    merged: false,
    squashTime: 0,   // 0이면 정상, >0이면 애니메이션 중
    faceState: 0,    // 0=기본, 1=놀람(낙하중), 2=기쁨(합체직후)
    faceTimer: 0,
    groundedTick: 0, // 바닥/다른 과일 접촉 프레임 수
  };
}

const fruits = [];

function physicsStep(dt) {
  // 중력 + 적분 + 상태 업데이트
  for (const f of fruits) {
    if (f.dead) continue;
    f.vy += GRAVITY * dt;
    f.vx *= LINEAR_DAMP;
    f.va *= ANG_DAMP;
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.angle += f.va * dt;
    if (f.squashTime > 0) {
      f.squashTime = Math.max(0, f.squashTime - dt / 0.22);
    }
    // 표정 상태 업데이트
    if (f.faceTimer > 0) {
      f.faceTimer = Math.max(0, f.faceTimer - dt);
      if (f.faceTimer === 0) f.faceState = 0;
    }
    // 낙하 중 놀람 (vy 빠름 + 땅/다른과일 안 닿음)
    if (f.vy > 400 && f.faceState !== 2) {
      f.faceState = 1; // 놀람
      f.faceTimer = 0.2;
    }
    // 라인 위 → 땀 (가장 우선)
    if (f.overLineAt > 0 && f.faceState !== 2) {
      f.faceState = 3; // 땀
      f.faceTimer = 0.5;
    }
  }

  // 벽 충돌 (안전 영역 적용)
  const floorY = H - SAFE_BOTTOM;
  const leftX = SAFE_SIDE;
  const rightX = W - SAFE_SIDE;
  for (const f of fruits) {
    if (f.dead) continue;
    if (f.x - f.r < leftX)   { f.x = leftX + f.r;     f.vx = Math.abs(f.vx) * WALL_REST;  f.vy *= WALL_FRICTION; f.va *= 0.7; }
    if (f.x + f.r > rightX)  { f.x = rightX - f.r;    f.vx = -Math.abs(f.vx) * WALL_REST; f.vy *= WALL_FRICTION; f.va *= 0.6; }
    if (f.y + f.r > floorY)  {
      const impactSpd = f.vy;
      f.y = floorY - f.r;
      f.vy = -Math.abs(f.vy) * WALL_REST;
      f.vx *= WALL_FRICTION; f.va *= 0.6;
      if (impactSpd > 250) {
        f.squashTime = 1;
        if (f.r > 40 && impactSpd > 400) spawnDust(f.x, floorY, f.r * 2);
      }
    }
  }

  // 원-원 충돌 (여러 패스: 낑긴 상태에서도 분리되도록)
  const passes = 4;
  for (let p = 0; p < passes; p++) {
    // 각 패스 시작 시 벽 재확인 (무거운 과일이 가벼운 과일을 벽 밖으로 미는 것 방지)
    for (const f of fruits) {
      if (f.dead) continue;
      if (f.x - f.r < leftX) f.x = leftX + f.r;
      if (f.x + f.r > rightX) f.x = rightX - f.r;
      if (f.y + f.r > floorY) f.y = floorY - f.r;
    }
    for (let i = 0; i < fruits.length; i++) {
      const a = fruits[i];
      if (a.dead) continue;
      for (let j = i + 1; j < fruits.length; j++) {
        const b = fruits[j];
        if (b.dead) continue;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const minD = a.r + b.r;
        const d2 = dx*dx + dy*dy;
        if (d2 >= minD*minD) continue;
        let d = Math.sqrt(d2);
        let nx, ny;
        if (d < 0.0001) { nx = 0; ny = -1; d = 0.0001; }
        else { nx = dx / d; ny = dy / d; }
        const overlap = minD - d;

        // 위치 분리 (질량 가중: 가벼운 쪽이 더 많이 밀림)
        const invSum = a.invMass + b.invMass;
        const aShare = a.invMass / invSum;
        const bShare = b.invMass / invSum;
        a.x -= nx * overlap * aShare;
        a.y -= ny * overlap * aShare;
        b.x += nx * overlap * bShare;
        b.y += ny * overlap * bShare;

        if (p === 0) {
          // 속도 반응 (질량 가중)
          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const vn = rvx * nx + rvy * ny;
          // 착지 감지: a가 위에서 b 위로 떨어짐 (ny > 0.5 = b가 a 아래) OR b가 a 아래서 튕겨 올림
          if (vn < -220) {
            if (ny > 0.55) a.squashTime = 1;
            if (ny < -0.55) b.squashTime = 1;
          }
          if (vn < 0) {
            // 노말 방향 임펄스 (충돌 반발)
            const jimp = -(1 + RESTITUTION) * vn / invSum;
            a.vx -= jimp * a.invMass * nx; a.vy -= jimp * a.invMass * ny;
            b.vx += jimp * b.invMass * nx; b.vy += jimp * b.invMass * ny;
            // 탄젠셜 방향 마찰 (미끄러짐 방지)
            const tx = -ny, ty = nx;
            const vt = rvx * tx + rvy * ty;
            const jfric = -vt * CONTACT_FRICTION / invSum;
            a.vx -= jfric * a.invMass * tx; a.vy -= jfric * a.invMass * ty;
            b.vx += jfric * b.invMass * tx; b.vy += jfric * b.invMass * ty;
            // 회전 유발 (작은 과일일수록 많이 돌아감)
            a.va -= vt * a.invMass * 0.03;
            b.va += vt * b.invMass * 0.03;
          }

          // 합체 체크
          if (a.tier === b.tier && !a.merged && !b.merged) {
            a.merged = b.merged = true;
            const mx = (a.x + b.x) * 0.5;
            const my = (a.y + b.y) * 0.5;
            const tIdx = a.tier;
            a.dead = true; b.dead = true;
            if (tIdx < TIERS.length - 1) {
              const resultTier = tIdx + 1;
              const nf = Fruit(mx, my, resultTier);
              nf.vy = -30;
              nf.squashTime = 0.22;
              nf.faceState = 2;
              nf.faceTimer = 0.35;
              fruits.push(nf);
              unlockTier(resultTier);
              registerCombo();
              // 보드 점수 변화량 계산 (이득분만 popup 표시)
              const delta = (TIER_POINTS[resultTier] || 0) - 2 * (TIER_POINTS[tIdx] || 0);
              stats.mergeCount++;
              stats.maxCombo = Math.max(stats.maxCombo, comboCount);
              stats.maxTier = Math.max(stats.maxTier, resultTier);
              playMergeSfx(tIdx);
              applyMergeFx(mx, my, resultTier, delta);
              if (resultTier === TIERS.length - 1) {
                triggerAchievement('🥔 전설의 감자!');
                triggerFlash(0.5);
                triggerShake(12, 0.5);
                triggerSlowMo(0.4, 0.3);
              }
            } else {
              // 감자 + 감자 = 보너스 (기존 룰 유지, 점수 고정)
              registerCombo();
              stats.mergeCount++;
              stats.maxCombo = Math.max(stats.maxCombo, comboCount);
              spawnPop(mx, my, TIERS[tIdx].color, TIERS[tIdx].r * 1.6);
              spawnBurst(mx, my, TIERS[tIdx].color, 60);
              spawnStreaks(mx, my, '#ffde59', 16);
              spawnScorePopup(mx, my - TIERS[tIdx].r * 0.5, '🎉 BONUS!', true);
              playMergeSfx(tIdx);
              haptic('big');
              triggerShake(15, 0.5);
              triggerSlowMo(0.35, 0.35);
              triggerFlash(0.6);
              triggerAchievement('✨ 감자 콤보!');
            }
          }
        }
      }
    }
  }

  // 죽은 과일 정리
  for (let i = fruits.length - 1; i >= 0; i--) {
    if (fruits[i].dead) fruits.splice(i, 1);
  }
}

// ============ 게임 상태 ============
let score = 0;
let best = parseInt(safeStorage.get('suika_best') || '0', 10);
let gameOver = false;
let canDrop = true;
let previewX = 0;
let currentTier = randomSpawnTier();
let nextTier = randomSpawnTier();

// 게임 통계
const stats = { mergeCount: 0, maxCombo: 0, maxTier: 0, startTime: performance.now() };
function resetStats() {
  stats.mergeCount = 0;
  stats.maxCombo = 0;
  stats.maxTier = 0;
  stats.startTime = performance.now();
}

// 도감 — 해제된 과일 티어
let unlockedTiers = new Set([0]); // 체리는 기본
try {
  const saved = safeStorage.get('suika_unlocked');
  if (saved) unlockedTiers = new Set(JSON.parse(saved));
} catch (e) {}
function unlockTier(t) {
  if (!unlockedTiers.has(t)) {
    unlockedTiers.add(t);
    safeStorage.set('suika_unlocked', JSON.stringify([...unlockedTiers]));
  }
}

// 등급별 점수 (보드 기반 스코어링)
const TIER_POINTS = [10, 30, 70, 150, 350, 800, 2000, 5000, 12000, 30000, 100000];
function calcBoardScore() {
  let total = 0;
  for (const f of fruits) {
    if (!f.dead) total += TIER_POINTS[f.tier] || 0;
  }
  return total;
}

function randomSpawnTier() {
  // progress 0: 체리 60 / 딸기 32 / 포도 6 / 귤 2
  // progress 1: 체리 30 / 딸기 28 / 포도 27 / 귤 15
  const progress = Math.min(1, score / 5000);
  const pCherry     = 0.60 - 0.30 * progress;
  const pStrawberry = 0.32 - 0.04 * progress;
  const pGrape      = 0.06 + 0.21 * progress;
  const r = Math.random();
  if (r < pCherry) return 0;
  if (r < pCherry + pStrawberry) return 1;
  if (r < pCherry + pStrawberry + pGrape) return 2;
  return 3;
}
// 점수 공식 (지수 커브: 후반 보상 극대화)
function mergeScore(resultTier) {
  return Math.round(Math.pow(resultTier, 2.3) * 2);
}

// 합체 티어별 이펙트 — 작을수록 조용, 클수록 화려
function applyMergeFx(mx, my, resultTier, pts) {
  const color = TIERS[resultTier].color;
  const r = TIERS[resultTier].r;
  let fxLevel;
  if (resultTier <= 3)      fxLevel = 0; // 1~3: 기본
  else if (resultTier <= 6) fxLevel = 1; // 4~6: 중간
  else if (resultTier <= 8) fxLevel = 2; // 7~8: 큼
  else                      fxLevel = 3; // 9~10: 메가

  // 기본 (항상)
  spawnPop(mx, my, color, r);
  spawnBurst(mx, my, color, 8 + fxLevel * 8);
  spawnScorePopup(mx, my - r * 0.6, '+' + pts, comboCount > 1);

  // 중간 이상: 빛줄기 추가
  if (fxLevel >= 1) spawnStreaks(mx, my, color, 6 + fxLevel * 4);

  // 큼 이상: 스크린 셰이크 + 햅틱 중
  if (fxLevel >= 2) {
    triggerShake(3 + fxLevel * 2, 0.15 + fxLevel * 0.05);
    haptic('big');
  } else {
    haptic('merge');
  }

  // 메가: 슬로우모션 + 플래시
  if (fxLevel >= 3) {
    triggerSlowMo(0.55, 0.2);
    triggerFlash(0.3);
  }
}

// 세션 시작 시점의 최고점 (넘으면 1회만 배너)
let sessionStartBest = best;
let recordBannerShown = false;

// 보드 상태 기반으로 score 재계산 (매 프레임 호출)
function refreshScore() {
  score = calcBoardScore();
  if (score > best) {
    best = score;
    safeStorage.set('suika_best', String(best));
    document.getElementById('best').textContent = best.toLocaleString();
  }
  if (!recordBannerShown && sessionStartBest > 0 && score > sessionStartBest) {
    recordBannerShown = true;
    triggerAchievement('🏆 최고 점수 갱신!');
  }
}
document.getElementById('best').textContent = best.toLocaleString();

function dropFruit(x) {
  if (!canDrop || gameOver) return;
  const r = TIERS[currentTier].r;
  const cx = Math.max(r + 4, Math.min(W - r - 4, x));
  const cy = Math.max(r + 10, LINE_Y - r - 10);
  fruits.push(Fruit(cx, cy, currentTier));
  currentTier = nextTier;
  nextTier = randomSpawnTier();
  canDrop = false;
  setTimeout(() => { canDrop = true; }, 450);
}

// ============ 입력 (여러 이벤트 안전장치) ============
function getEventX(e) {
  const rect = wrap.getBoundingClientRect();
  let cx;
  if (e.clientX != null) cx = e.clientX;
  else if (e.touches && e.touches[0]) cx = e.touches[0].clientX;
  else if (e.changedTouches && e.changedTouches[0]) cx = e.changedTouches[0].clientX;
  else return null;
  return cx - rect.left;
}
function getEventY(e) {
  const rect = wrap.getBoundingClientRect();
  let cy;
  if (e.clientY != null) cy = e.clientY;
  else if (e.touches && e.touches[0]) cy = e.touches[0].clientY;
  else if (e.changedTouches && e.changedTouches[0]) cy = e.changedTouches[0].clientY;
  else return null;
  return cy - rect.top;
}

function onMove(e) {
  const x = getEventX(e);
  if (x != null) previewX = x;
}
let _lastDownTime = 0;
function onDown(e) {
  // 같은 탭이 touchstart/mousedown/pointerdown 여러번 트리거되는 거 방지
  const now = Date.now();
  if (now - _lastDownTime < 80) return;
  _lastDownTime = now;

  if (e.target && e.target.closest && (
    e.target.closest('.btn') ||
    e.target.closest('.revive-btn') ||
    e.target.closest('.overlay.show') ||
    e.target.closest('.tutorial-overlay.show') ||
    e.target.closest('.dex-overlay.show') ||
    e.target.closest('.item-slot') ||
    e.target.closest('#muteBtn') ||
    e.target.closest('#dexBtn') ||
    e.target.closest('#tutorialClose') ||
    e.target.closest('#dexClose')
  )) return;
  if (document.getElementById('tutorial').classList.contains('show')) return;
  if (document.getElementById('dexOverlay').classList.contains('show')) return;

  const x = getEventX(e);
  const y = getEventY(e);

  // 이어하기 선택 모드 — 3개 선택까지 과일만 제거, 드롭 X
  if (reviveMode) {
    if (x != null && y != null) {
      const f = findFruitAt(x, y);
      if (f) applyReviveSelection(f);
      // 빈 공간 탭 무시 (실수로 취소 방지)
    }
    e.preventDefault && e.preventDefault();
    return;
  }

  // 물약 모드 — 과일 진화 or 취소
  if (potionMode) {
    if (x != null && y != null) {
      const f = findFruitAt(x, y);
      if (f && inventory.potion > 0) {
        usePotionOn(f);
      } else if (!f) {
        potionMode = false;
        updatePotionSlot();
      }
    }
    e.preventDefault && e.preventDefault();
    return;
  }

  if (x != null) { previewX = x; dropFruit(x); }
  e.preventDefault && e.preventDefault();
}

wrap.addEventListener('pointermove', onMove, { passive: true });
wrap.addEventListener('pointerdown', onDown);
wrap.addEventListener('mousemove', onMove, { passive: true });
wrap.addEventListener('mousedown', onDown);
wrap.addEventListener('touchmove', onMove, { passive: true });
wrap.addEventListener('touchstart', onDown, { passive: false });

// 초기 프리뷰 위치
previewX = W / 2;

// ============ 팝 이펙트 ============
const pops = [];
function spawnPop(x, y, color, r) {
  pops.push({ x, y, r: r * 0.8, maxR: r * 1.9, life: 1, color });
}
function updatePops(dt) {
  for (let i = pops.length - 1; i >= 0; i--) {
    const p = pops[i];
    p.life -= dt / 0.35;
    p.r += (p.maxR - p.r) * 0.2;
    if (p.life <= 0) pops.splice(i, 1);
  }
}

// ============ 게임 오버 체크 ============
const GAME_OVER_MS = 2200; // 과일 상단이 선에 닿은 채 2.2초 (타이트하게)
let paused = false;
let testMode = false; // 전체 과일 테스트 중엔 게임오버 판정 금지

// 탭 백그라운드 / 포커스 잃을 때 일시정지
document.addEventListener('visibilitychange', () => {
  paused = document.hidden || isLandscape();
  if (paused) {
    for (const f of fruits) f.overLineAt = 0;
  }
});

// 가로모드 감지 + 강제 세로 유도
function isLandscape() {
  return window.innerWidth > window.innerHeight && window.innerWidth < 1100;
}
function updateOrientation() {
  const rotateEl = document.getElementById('rotateOverlay');
  if (!rotateEl) return;
  if (isLandscape()) {
    rotateEl.classList.add('show');
    paused = true;
    // 라인 카운트 리셋 (복귀 시 즉시 게임오버 방지)
    for (const f of fruits) f.overLineAt = 0;
  } else {
    rotateEl.classList.remove('show');
    paused = document.hidden;
  }
}
window.addEventListener('resize', updateOrientation);
window.addEventListener('orientationchange', updateOrientation);

// Screen Orientation API로 세로 락 시도 (지원되는 브라우저에서만)
try {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('portrait').catch(() => {}); // 실패해도 무시 (Telegram WebView에선 보통 실패)
  }
} catch (e) {}

// 초기 체크
setTimeout(updateOrientation, 100);

function checkGameOver() {
  if (testMode) return;
  if (gameOver) return;
  if (reviveMode) return; // 이어하기 선택 중엔 판정 중지
  const now = performance.now();
  let anyOver = false;
  for (const f of fruits) {
    if (now - f.createdAt < 300) continue; // 스폰 직후 순간 무시
    const top = f.y - f.r;
    if (top <= LINE_Y) {
      if (!f.overLineAt) f.overLineAt = now;
      anyOver = true;
      if (now - f.overLineAt >= GAME_OVER_MS) { triggerGameOver(); return; }
    } else {
      f.overLineAt = 0;
    }
  }
  // 경고용: 가장 오래 닿아있는 시간을 전역에 저장 (렌더에서 시각화)
  let maxOver = 0;
  if (anyOver) {
    for (const f of fruits) {
      if (f.overLineAt) maxOver = Math.max(maxOver, now - f.overLineAt);
    }
  }
  window.__lineDanger = maxOver / GAME_OVER_MS; // 0~1
}

function updatePotionSlot() {
  const slot = document.getElementById('potionSlot');
  const descEl = document.getElementById('potionDesc');
  const priceEl = document.getElementById('potionPrice');
  slot.classList.remove('active', 'used', 'ready');

  if (potionMode && inventory.potion > 0) {
    slot.classList.add('active');
    descEl.textContent = '과일 선택';
    priceEl.style.display = 'none';
  } else if (inventory.potion > 0) {
    slot.classList.add('ready');
    descEl.textContent = '탭해서 사용';
    priceEl.style.display = 'none';
  } else if (!potionAvailable) {
    slot.classList.add('used');
    descEl.textContent = '사용 완료';
    priceEl.style.display = 'none';
  } else {
    descEl.textContent = '한 개 진화';
    priceEl.textContent = '💎 ' + POTION_PRICE;
    priceEl.style.display = '';
  }
}

async function onPotionSlotTap() {
  if (gameOver) return;
  if (!potionAvailable && inventory.potion === 0) return;
  if (inventory.potion > 0) {
    potionMode = !potionMode;
    updatePotionSlot();
    return;
  }
  try {
    const result = await ParentBridge.buyItem('potion', POTION_PRICE);
    if (result && result.success) {
      inventory.potion = 1;
      potionAvailable = false;
      potionMode = true;
      updatePotionSlot();
      showToast('🧪 획득! 과일을 탭해 진화', 1600);
    } else {
      showToast('💎 다이아가 부족합니다', 1400);
    }
  } catch (e) {
    showToast('구매 실패', 1200);
  }
}

function usePotionOn(f) {
  if (f.tier > POTION_MAX_TIER) {
    // 진화 불가 (파인애플 이상)
    showToast('더 진화시킬 수 없습니다 🧪', 1200);
    haptic('merge');
    return false;
  }
  const newTier = f.tier + 1;
  const mx = f.x, my = f.y;
  f.dead = true;
  const nf = Fruit(mx, my, newTier);
  nf.vy = -60;
  nf.squashTime = 0.22;
  nf.faceState = 2;
  nf.faceTimer = 0.35;
  fruits.push(nf);
  unlockTier(newTier);
  stats.maxTier = Math.max(stats.maxTier, newTier);
  // 진화 연출
  spawnBurst(mx, my, TIERS[newTier].color, 22);
  spawnPop(mx, my, TIERS[newTier].color, TIERS[newTier].r);
  spawnStreaks(mx, my, '#c4a0ff', 10);
  triggerShake(4, 0.15);
  haptic('big');
  inventory.potion = 0;
  potionMode = false;
  updatePotionSlot();
  return true;
}

// 포인터 위치에서 과일 찾기 (위 쌓인 것 우선)
function findFruitAt(px, py) {
  // 뒤에 추가된 과일부터 (위에 그려진 것 우선)
  for (let i = fruits.length - 1; i >= 0; i--) {
    const f = fruits[i];
    if (f.dead) continue;
    const dx = px - f.x, dy = py - f.y;
    if (dx * dx + dy * dy <= f.r * f.r) return f;
  }
  return null;
}

function applyReviveSelection(f) {
  if (f.tier > REVIVE_MAX_TIER) {
    showToast('이 등급은 제거할 수 없습니다 🚫', 1200);
    haptic('merge');
    return false;

  spawnBurst(f.x, f.y, TIERS[f.tier].color, 20);
  spawnPop(f.x, f.y, TIERS[f.tier].color, f.r);
  f.dead = true;
  reviveRemaining--;
  haptic('merge');

  return true;
}

  reviveMode = false;

  for (const f of fruits) { if (!f.dead) f.overLineAt = 0; }

// ============ 도감 — 실제 게임 내 과일 모습 스프라이트 ============
const fruitSpriteCache = {}; // tier idx → dataURL

// drawFruit을 오프스크린 캔버스에 재사용해 실제 과일 이미지 생성
function renderFruitSprite(tierIdx) {
  if (fruitSpriteCache[tierIdx]) return fruitSpriteCache[tierIdx];
  const SIZE = 160; // 스프라이트 크기 (고해상도)
  const sprite = document.createElement('canvas');
  sprite.width = sprite.height = SIZE;
  const sctx = sprite.getContext('2d');
  // 가짜 과일 데이터 (중앙 배치, 회전 없음)
  const fakeFruit = {
    x: SIZE / 2,
    y: SIZE / 2 + 8,       // 꼭지/잎이 위로 올라가니 살짝 내림
    tier: tierIdx,
    r: SIZE * 0.32,         // 여백 확보 (꼭지/크라운 공간)
    angle: 0,
    dead: false,
    squashTime: 0,
    faceState: 0,
    faceTimer: 0,
    createdAt: 0,
    overLineAt: 0,
    merged: false,
    mass: 1, invMass: 1,
    vx: 0, vy: 0, va: 0,
    id: 0,
    groundedTick: 0,
  };
  // ctx 임시 교체 → drawFruit 그대로 사용
  const savedCtx = ctx;
  ctx = sctx;
  try {
    drawFruit(fakeFruit, 1.0);
  } catch (e) {
    console.error('sprite render error', e);
  }
  ctx = savedCtx;
  const url = sprite.toDataURL();
  fruitSpriteCache[tierIdx] = url;
  return url;
}

// ============ 렌더링 ============
function shade(hex, amt) {
  const c = hex.replace('#', '');
  let r = parseInt(c.substr(0, 2), 16);
  let g = parseInt(c.substr(2, 2), 16);
  let b = parseInt(c.substr(4, 2), 16);
  r = Math.round(r + (amt > 0 ? (255 - r) * amt : r * amt));
  g = Math.round(g + (amt > 0 ? (255 - g) * amt : g * amt));
  b = Math.round(b + (amt > 0 ? (255 - b) * amt : b * amt));
  return `rgb(${Math.max(0, Math.min(255, r))},${Math.max(0, Math.min(255, g))},${Math.max(0, Math.min(255, b))})`;
}

function drawFace(r, face) {
  const eyeY = r * 0.02;
  const eyeX = r * 0.30;
  const eyeR = Math.max(3, r * 0.14); // 기존 0.07 → 0.14 (2배)
  const mouthY = r * 0.38;
  const mw = r * 0.19;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // 검정 점 눈 (흰자 없음, 참고 사진 스타일)
  const bigEye = (x, y, mod = 1) => {
    const eR = eyeR * mod;
    // 살짝 세로로 갸름한 타원
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(x, y, eR * 0.88, eR * 1.02, 0, 0, Math.PI * 2); ctx.fill();
    // 작은 sparkle 하나만
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x - eR * 0.25, y - eR * 0.3, eR * 0.22, eR * 0.28, -0.3, 0, Math.PI * 2);
    ctx.fill();
  };
  // 윙크 / 감은눈 (⌒ 스마일 커브, 위로 솟음)
  const winkEye = (x, y) => {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = Math.max(2, r * 0.08);
    ctx.beginPath();
    ctx.moveTo(x - eyeR, y + eyeR * 0.2);
    ctx.quadraticCurveTo(x, y - eyeR * 0.95, x + eyeR, y + eyeR * 0.2);
    ctx.stroke();
  };
  // 하트눈
  const heartEye = (x, y) => {
    const s = eyeR * 1.15;
    ctx.fillStyle = '#ff3a5e';
    ctx.beginPath();
    ctx.moveTo(x, y - s * 0.1);
    ctx.bezierCurveTo(x - s * 0.95, y - s * 0.95, x - s * 1.3, y + s * 0.2, x, y + s * 0.95);
    ctx.bezierCurveTo(x + s * 1.3, y + s * 0.2, x + s * 0.95, y - s * 0.95, x, y - s * 0.1);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath();
    ctx.ellipse(x - s * 0.35, y - s * 0.2, s * 0.22, s * 0.14, -0.3, 0, Math.PI * 2);
    ctx.fill();
  };

  // === 눈 ===
  if (face === 'wink-r') {
    bigEye(-eyeX, eyeY);
    winkEye(eyeX, eyeY);
  } else if (face === 'wink-l') {
    winkEye(-eyeX, eyeY);
    bigEye(eyeX, eyeY);
  } else if (face === 'happy') {
    winkEye(-eyeX, eyeY);
    winkEye(eyeX, eyeY);
  } else if (face === 'heart') {
    heartEye(-eyeX, eyeY);
    heartEye(eyeX, eyeY);
  } else if (face === 'surprised') {
    bigEye(-eyeX, eyeY, 1.4);
    bigEye(eyeX, eyeY, 1.4);
  } else if (face === 'stoic') {
    // 수박 보스 느낌: 굵은 눈썹 + 단단한 큰 눈
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = r * 0.1;
    ctx.beginPath();
    ctx.moveTo(-eyeX - eyeR * 1.3, eyeY - eyeR * 1.55);
    ctx.lineTo(-eyeX + eyeR * 0.3, eyeY - eyeR * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(eyeX + eyeR * 1.3, eyeY - eyeR * 1.55);
    ctx.lineTo(eyeX - eyeR * 0.3, eyeY - eyeR * 0.7);
    ctx.stroke();
    bigEye(-eyeX, eyeY + eyeR * 0.1, 1.05);
    bigEye(eyeX, eyeY + eyeR * 0.1, 1.05);
  } else {
    bigEye(-eyeX, eyeY);
    bigEye(eyeX, eyeY);
  }

  // === 입 ===
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = Math.max(1.8, r * 0.065);
  if (face === 'surprised') {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(0, mouthY, mw * 0.55, mw * 0.8, 0, 0, Math.PI * 2); ctx.fill();
  } else if (face === 'grin') {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(0, mouthY, mw * 1.5, mw * 0.9, 0, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#ff708a';
    ctx.beginPath();
    ctx.ellipse(0, mouthY + mw * 0.6, mw * 0.9, mw * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (face === 'tongue') {
    ctx.beginPath();
    ctx.arc(0, mouthY, mw, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
    ctx.fillStyle = '#ff708a';
    ctx.beginPath();
    ctx.ellipse(mw * 0.35, mouthY + mw * 0.5, mw * 0.5, mw * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (face === 'stoic') {
    ctx.beginPath();
    ctx.moveTo(-mw * 0.7, mouthY + mw * 0.15);
    ctx.lineTo(mw * 0.7, mouthY + mw * 0.15);
    ctx.stroke();
  } else if (face === 'smug') {
    ctx.beginPath();
    ctx.moveTo(-mw * 1.05, mouthY + mw * 0.35);
    ctx.quadraticCurveTo(0, mouthY + mw * 0.7, mw * 1.15, mouthY - mw * 0.25);
    ctx.stroke();
  } else if (face === 'heart') {
    // 살짝 벌린 입 (히죽)
    ctx.beginPath();
    ctx.arc(0, mouthY, mw * 1.1, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
  } else if (face === 'cat') {
    // 고양이 ω 입
    ctx.beginPath();
    ctx.moveTo(-mw * 1.1, mouthY);
    ctx.quadraticCurveTo(-mw * 0.55, mouthY + mw * 0.7, 0, mouthY + mw * 0.1);
    ctx.quadraticCurveTo(mw * 0.55, mouthY + mw * 0.7, mw * 1.1, mouthY);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(0, mouthY, mw, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.stroke();
  }

  // === 볼터치 ===
  if (face === 'blush' || face === 'happy' || face === 'heart') {
    ctx.fillStyle = 'rgba(255,120,140,0.5)';
    ctx.beginPath(); ctx.ellipse(-eyeX - r * 0.1, eyeY + r * 0.25, r * 0.14, r * 0.09, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(eyeX + r * 0.1, eyeY + r * 0.25, r * 0.14, r * 0.09, 0, 0, Math.PI * 2); ctx.fill();
  }
}

function drawFruit(f, alpha) {
  const t = TIERS[f.tier];
  const r = f.r;
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.angle);
  if (alpha != null) ctx.globalAlpha = alpha;
  // 착지 스쿼시 (Y압축 + X팽창)
  if (f.squashTime > 0) {
    const s = f.squashTime;
    const squashY = 1 - s * 0.22;
    const stretchX = 1 + s * 0.14;
    ctx.scale(stretchX, squashY);
    // 압축 방향 보정 (아래로 눌림)
    ctx.translate(0, r * (1 - squashY) * 0.5);
  }

  // === 본체 베이스 컬러 ===
  if (t.color2) {
    // 다색 (위→아래 선형)
    const lin = ctx.createLinearGradient(0, -r, 0, r);
    lin.addColorStop(0, shade(t.color, 0.25));
    lin.addColorStop(0.5, t.color);
    lin.addColorStop(1, t.color2);
    ctx.fillStyle = lin;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  } else {
    // 단일색 방사 (더 강한 대비)
    const grad = ctx.createRadialGradient(-r * 0.32, -r * 0.36, r * 0.05, 0, 0, r);
    grad.addColorStop(0, shade(t.color, 0.55));
    grad.addColorStop(0.5, t.color);
    grad.addColorStop(1, shade(t.color, -0.32));
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  }

  // === 강한 림 그림자 (가장자리 어둡게 → 3D 입체감) ===
  const rim = ctx.createRadialGradient(0, 0, r * 0.72, 0, 0, r);
  rim.addColorStop(0, 'rgba(0,0,0,0)');
  rim.addColorStop(0.8, 'rgba(0,0,0,0.06)');
  rim.addColorStop(1, 'rgba(0,0,0,0.38)');
  ctx.fillStyle = rim;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

  // === 하단 반사광 (바닥에서 튕기는 빛) ===
  const bot = ctx.createRadialGradient(r * 0.22, r * 0.52, 0, r * 0.22, r * 0.52, r * 0.55);
  bot.addColorStop(0, 'rgba(255,255,255,0.28)');
  bot.addColorStop(0.6, 'rgba(255,255,255,0.08)');
  bot.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = bot;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

  // 과일 이름 (상단 장식 분기에서 사용)
  const n = t.name;

  // === 메인 하이라이트 (좌상단 큰 광택) ===
  const hi = ctx.createRadialGradient(-r * 0.3, -r * 0.4, 0, -r * 0.3, -r * 0.4, r * 0.72);
  hi.addColorStop(0, 'rgba(255,255,255,0.85)');
  hi.addColorStop(0.35, 'rgba(255,255,255,0.35)');
  hi.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hi;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

  // === 작은 글린트 (강한 흰점 — 비닐감) ===
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.35, -r * 0.42, r * 0.2, r * 0.11, -0.35, 0, Math.PI * 2);
  ctx.fill();
  // 보조 작은 글린트
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.1, -r * 0.55, r * 0.08, r * 0.04, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // 얼굴 — 상태에 따라 오버라이드 (낙하=놀람, 합체=기쁨, 라인=땀)
  let face = t.face || 'smile';
  if (f && f.faceState === 1) face = 'surprised';
  else if (f && f.faceState === 2) face = 'happy';
  drawFace(r, face);
  // 땀방울 (상태 3)
  if (f && f.faceState === 3) {
    ctx.save();
    ctx.fillStyle = '#7cc4ff';
    ctx.strokeStyle = '#3a8ac4';
    ctx.lineWidth = 1;
    const sx = r * 0.5, sy = -r * 0.05;
    ctx.beginPath();
    ctx.moveTo(sx, sy - r * 0.2);
    ctx.quadraticCurveTo(sx + r * 0.12, sy - r * 0.05, sx + r * 0.08, sy + r * 0.08);
    ctx.quadraticCurveTo(sx - r * 0.05, sy + r * 0.08, sx - r * 0.06, sy - r * 0.05);
    ctx.quadraticCurveTo(sx - r * 0.02, sy - r * 0.15, sx, sy - r * 0.2);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 하이라이트
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.ellipse(sx - r * 0.02, sy - r * 0.08, r * 0.025, r * 0.04, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // === 과일별 상단 장식 (꼭지/잎/크라운) ===
  if (n === '체리') {
    // 휘어진 갈색 꼭지 + 잎
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = Math.max(1.5, r * 0.08);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.85);
    ctx.quadraticCurveTo(r * 0.25, -r * 1.15, r * 0.4, -r * 1.22);
    ctx.stroke();
    ctx.save();
    ctx.translate(r * 0.42, -r * 1.18);
    ctx.rotate(-0.3);
    ctx.fillStyle = '#6BAA3F';
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.32, r * 0.14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#3a6a1a';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-r * 0.28, 0); ctx.lineTo(r * 0.28, 0); ctx.stroke();
    ctx.restore();
  } else if (n === '딸기') {
    // 녹색 칼릭스 (뾰족한 잎 왕관)
    ctx.save();
    ctx.translate(0, -r * 0.85);
    const leafColors = ['#3d8a28', '#4a9a33', '#58ab3e'];
    for (let i = -2; i <= 2; i++) {
      const ang = i * 0.35;
      const len = r * (0.4 + (Math.abs(i) === 1 ? 0.05 : 0));
      ctx.save();
      ctx.rotate(ang);
      ctx.fillStyle = leafColors[(i + 2) % leafColors.length];
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(r * 0.15, -len * 0.5, 0, -len);
      ctx.quadraticCurveTo(-r * 0.15, -len * 0.5, 0, 0);
      ctx.fill();
      ctx.strokeStyle = 'rgba(20,50,10,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(0, -len * 0.9);
      ctx.stroke();
      ctx.restore();
    }
    ctx.fillStyle = '#2a5a1a';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.13, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else if (n === '귤' || n === '사과') {
    // 얇은 갈색 꼭지 + 잎
    ctx.strokeStyle = '#4a2e10';
    ctx.lineWidth = Math.max(1.5, r * 0.055);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.92);
    ctx.lineTo(0, -r * 1.12);
    ctx.stroke();
    ctx.save();
    ctx.translate(r * 0.05, -r * 1.05);
    ctx.rotate(-0.5);
    const lg = ctx.createLinearGradient(0, -r * 0.1, 0, r * 0.1);
    lg.addColorStop(0, '#7cc24a');
    lg.addColorStop(1, '#3d7a20');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.ellipse(r * 0.18, 0, r * 0.28, r * 0.13, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a5a10';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-r * 0.05, 0);
    ctx.lineTo(r * 0.35, 0);
    ctx.stroke();
    ctx.restore();
  } else if (n === '감') {
    // 녹색 4엽 꽃받침
    ctx.save();
    ctx.translate(0, -r * 0.85);
    for (let i = 0; i < 4; i++) {
      ctx.save();
      ctx.rotate((i / 4) * Math.PI * 2);
      const pg = ctx.createLinearGradient(0, 0, r * 0.35, 0);
      pg.addColorStop(0, '#4a8225');
      pg.addColorStop(1, '#7ab53d');
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(r * 0.2, -r * 0.05, r * 0.36, r * 0.04);
      ctx.quadraticCurveTo(r * 0.22, r * 0.14, 0, r * 0.08);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#2a4f10';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }
    ctx.fillStyle = '#3a2a10';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.07, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else if (n === '배') {
    // 얇은 꼭지
    ctx.strokeStyle = '#6a4a2a';
    ctx.lineWidth = Math.max(1.2, r * 0.04);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.95);
    ctx.quadraticCurveTo(r * 0.04, -r * 1.06, r * 0.02, -r * 1.18);
    ctx.stroke();
  } else if (n === '복숭아') {
    // 잎 1개
    ctx.save();
    ctx.translate(r * 0.18, -r * 0.85);
    ctx.rotate(-0.65);
    const lg = ctx.createLinearGradient(0, -r * 0.1, 0, r * 0.1);
    lg.addColorStop(0, '#7cc24a');
    lg.addColorStop(1, '#3d7a20');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.35, r * 0.13, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a5a10';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-r * 0.3, 0); ctx.lineTo(r * 0.3, 0);
    ctx.stroke();
    ctx.restore();
  } else if (n === '파인애플') {
    // 뾰족한 녹색 잎 크라운 (5장)
    ctx.save();
    ctx.translate(0, -r * 0.82);
    for (let i = -2; i <= 2; i++) {
      const ang = i * 0.28;
      const len = r * (0.55 - Math.abs(i) * 0.07);
      ctx.save();
      ctx.rotate(ang);
      const grd = ctx.createLinearGradient(0, 0, 0, -len);
      grd.addColorStop(0, '#2a6a18');
      grd.addColorStop(0.5, '#58b23a');
      grd.addColorStop(1, '#8dd460');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(-r * 0.09, 0);
      ctx.quadraticCurveTo(-r * 0.04, -len * 0.5, 0, -len);
      ctx.quadraticCurveTo(r * 0.04, -len * 0.5, r * 0.09, 0);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(20,50,10,0.55)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // 중앙 잎맥
      ctx.strokeStyle = 'rgba(20,50,10,0.35)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(0, -len * 0.9);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  } else if (n === '멜론') {
    // 짧은 꼭지 + 작은 잎
    ctx.strokeStyle = '#3a6a1a';
    ctx.lineWidth = Math.max(1.5, r * 0.05);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.96);
    ctx.quadraticCurveTo(r * 0.08, -r * 1.04, r * 0.15, -r * 1.1);
    ctx.stroke();
    ctx.save();
    ctx.translate(r * 0.2, -r * 1.02);
    ctx.rotate(0.35);
    const lg = ctx.createLinearGradient(0, -r * 0.1, 0, r * 0.1);
    lg.addColorStop(0, '#7cc24a');
    lg.addColorStop(1, '#3d7a20');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.22, r * 0.09, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

// ============ 배경 장식 (정적 부분은 오프스크린 캐싱) ============
let bgCache = null;
let bgCacheW = 0, bgCacheH = 0;
function ensureBgCache() {
  if (bgCache && bgCacheW === Math.floor(W) && bgCacheH === Math.floor(H)) return;
  bgCacheW = Math.floor(W);
  bgCacheH = Math.floor(H);
  bgCache = document.createElement('canvas');
  bgCache.width = Math.floor(W * DPR);
  bgCache.height = Math.floor(H * DPR);
  const bc = bgCache.getContext('2d');
  bc.scale(DPR, DPR);
  drawStaticBackground(bc);
}

function drawStaticBackground(c) {
  // 좌우 나무 트렁크
  const trunkW = 22;
  const lg = c.createLinearGradient(0, 0, trunkW, 0);
  lg.addColorStop(0, '#2d1a08'); lg.addColorStop(0.5, '#5a3818'); lg.addColorStop(1, '#3d2510');
  c.fillStyle = lg; c.fillRect(0, 0, trunkW, H);
  const rg = c.createLinearGradient(W - trunkW, 0, W, 0);
  rg.addColorStop(0, '#3d2510'); rg.addColorStop(0.5, '#5a3818'); rg.addColorStop(1, '#2d1a08');
  c.fillStyle = rg; c.fillRect(W - trunkW, 0, trunkW, H);
  c.strokeStyle = 'rgba(0,0,0,0.35)'; c.lineWidth = 1;
  for (let y = 0; y < H; y += 14) {
    c.beginPath(); c.moveTo(5, y); c.lineTo(7, y + 10); c.stroke();
    c.beginPath(); c.moveTo(14, y + 7); c.lineTo(16, y + 17); c.stroke();
    c.beginPath(); c.moveTo(W - 17, y); c.lineTo(W - 15, y + 10); c.stroke();
    c.beginPath(); c.moveTo(W - 8, y + 7); c.lineTo(W - 6, y + 17); c.stroke();
  }
  // 덩굴 줄기 (정적)
  c.strokeStyle = 'rgba(70,130,45,0.7)'; c.lineWidth = 2;
  c.beginPath();
  c.moveTo(28, 0);
  c.quadraticCurveTo(45, 40, 32, 90);
  c.quadraticCurveTo(22, 130, 38, 170);
  c.stroke();
  c.beginPath();
  c.moveTo(W - 28, 0);
  c.quadraticCurveTo(W - 48, 50, W - 32, 100);
  c.quadraticCurveTo(W - 20, 150, W - 38, 190);
  c.stroke();
}

function drawBackground() {
  ensureBgCache();
  // 캐시된 정적 배경 한 번에 복사
  ctx.drawImage(bgCache, 0, 0, W, H);
  // 흔들리는 잎사귀 (크게 + 좌우 균형)
  const t = performance.now() / 1000;
  const sway1 = Math.sin(t * 0.8) * 0.06;
  const sway2 = Math.sin(t * 0.6 + 1.2) * 0.05;
  // 좌측 상단: 크게 (점수 UI 프레임 역할)
  drawLeafCluster(10, 58, 88, -0.3 + sway1, 0);
  drawLeafCluster(W * 0.22, 18, 66, -0.55 + sway2 * 1.2, 2);
  // 우측 상단: 크게
  drawLeafCluster(W - 10, 60, 85, Math.PI + 0.28 + sway2, 1);
  drawLeafCluster(W * 0.78, 20, 68, 0.55 + sway1 * 1.1, 0);
  // 덩굴 끝 잎
  drawSmallLeaf(38 + Math.sin(t * 1.1) * 2, 180, -0.3);
  drawSmallLeaf(W - 38 - Math.sin(t * 0.9) * 2, 200, 0.3 + Math.PI);
}

function _drawBackgroundOld() {
  // 좌우 나무 트렁크 (세로 띠)
  const trunkW = 22;
  const lg = ctx.createLinearGradient(0, 0, trunkW, 0);
  lg.addColorStop(0, '#2d1a08');
  lg.addColorStop(0.5, '#5a3818');
  lg.addColorStop(1, '#3d2510');
  ctx.fillStyle = lg;
  ctx.fillRect(0, 0, trunkW, H);
  const rg = ctx.createLinearGradient(W - trunkW, 0, W, 0);
  rg.addColorStop(0, '#3d2510');
  rg.addColorStop(0.5, '#5a3818');
  rg.addColorStop(1, '#2d1a08');
  ctx.fillStyle = rg;
  ctx.fillRect(W - trunkW, 0, trunkW, H);
  // 트렁크 세로 결 (텍스처)
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 14) {
    ctx.beginPath();
    ctx.moveTo(5, y); ctx.lineTo(7, y + 10); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(14, y + 7); ctx.lineTo(16, y + 17); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W - 17, y); ctx.lineTo(W - 15, y + 10); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W - 8, y + 7); ctx.lineTo(W - 6, y + 17); ctx.stroke();
  }
  // 상단 좌우 잎사귀 군집
  drawLeafCluster(18, 35, 55, -0.35, 0);
  drawLeafCluster(W - 18, 38, 52, Math.PI + 0.3, 1);
  drawLeafCluster(W * 0.25, 8, 38, -0.5, 2);
  drawLeafCluster(W * 0.78, 12, 42, 0.6, 0);
  // 좌우 덩굴 (상단에서 내려오는 가는 선)
  ctx.strokeStyle = 'rgba(70,130,45,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(28, 0);
  ctx.quadraticCurveTo(45, 40, 32, 90);
  ctx.quadraticCurveTo(22, 130, 38, 170);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(W - 28, 0);
  ctx.quadraticCurveTo(W - 48, 50, W - 32, 100);
  ctx.quadraticCurveTo(W - 20, 150, W - 38, 190);
  ctx.stroke();
  // 덩굴 끝 작은 잎
  drawSmallLeaf(38, 170, -0.3);
  drawSmallLeaf(W - 38, 190, 0.3 + Math.PI);
}

function drawLeafCluster(cx, cy, size, tilt, seed) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(tilt);
  const palette = ['#1e4a10', '#2d6a20', '#4a9030', '#3d7a28'];
  const leaves = [
    { x: -size * 0.45, y: 0, w: size * 0.9, h: size * 0.45, a: -0.3, c: 0 },
    { x: size * 0.1, y: -size * 0.2, w: size * 0.85, h: size * 0.4, a: -0.1, c: 1 },
    { x: size * 0.35, y: size * 0.1, w: size * 0.75, h: size * 0.38, a: 0.35, c: 2 },
    { x: 0, y: size * 0.25, w: size * 1.0, h: size * 0.5, a: 0.1, c: 3 },
    { x: -size * 0.2, y: size * 0.35, w: size * 0.7, h: size * 0.35, a: 0.55, c: 1 },
  ];
  for (const L of leaves) {
    ctx.save();
    ctx.translate(L.x, L.y);
    ctx.rotate(L.a);
    const lg2 = ctx.createLinearGradient(-L.w, 0, L.w, 0);
    const base = palette[(L.c + seed) % palette.length];
    lg2.addColorStop(0, shade(base, -0.2));
    lg2.addColorStop(0.5, base);
    lg2.addColorStop(1, shade(base, 0.25));
    ctx.fillStyle = lg2;
    ctx.beginPath();
    ctx.ellipse(0, 0, L.w, L.h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 잎맥
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-L.w * 0.9, 0); ctx.lineTo(L.w * 0.9, 0);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function drawSmallLeaf(x, y, tilt) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);
  const lg = ctx.createLinearGradient(-12, 0, 12, 0);
  lg.addColorStop(0, '#2d6a20');
  lg.addColorStop(1, '#58b23a');
  ctx.fillStyle = lg;
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-10, 0); ctx.lineTo(10, 0);
  ctx.stroke();
  ctx.restore();
}

// ============ 파티클 (상한 적용) ============
const PARTICLE_CAP = 250;
const particles = [];
function spawnBurst(x, y, color, count) {
  count = count || 14;
  for (let i = 0; i < count; i++) {
    if (particles.length >= PARTICLE_CAP) particles.shift();
    const a = (i / count) * Math.PI * 2 + Math.random() * 0.5;
    const sp = 120 + Math.random() * 200;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 40,
      life: 1,
      color,
      size: 3 + Math.random() * 3,
      kind: 'burst',
    });
  }
}
// 방사형 라이트 스트릭 (짧은 선)
const streaks = [];
function spawnStreaks(x, y, color, count) {
  count = count || 8;
  for (let i = 0; i < count; i++) {
    if (streaks.length >= 60) streaks.shift();
    const a = (i / count) * Math.PI * 2 + Math.random() * 0.3;
    const sp = 220 + Math.random() * 160;
    streaks.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, color, len: 14 + Math.random() * 8,
    });
  }
}
// 착지 먼지
function spawnDust(x, y, size) {
  const count = 4 + Math.floor(size / 20);
  for (let i = 0; i < count; i++) {
    if (particles.length >= PARTICLE_CAP) particles.shift();
    const a = (Math.random() - 0.5) * Math.PI + Math.PI; // 아래쪽
    const sp = 40 + Math.random() * 80;
    particles.push({
      x: x + (Math.random() - 0.5) * size * 0.4,
      y, vx: Math.cos(a - 0.5 + Math.random()) * sp * (Math.random() < 0.5 ? -1 : 1),
      vy: -Math.abs(Math.cos(a) * sp) * 0.3,
      life: 1, color: 'rgba(140,100,60,0.6)',
      size: 3 + Math.random() * 4, kind: 'dust',
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt / (p.kind === 'dust' ? 0.55 : 0.7);
    p.vy += (p.kind === 'dust' ? 150 : 700) * dt;
    p.vx *= 0.98;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = streaks.length - 1; i >= 0; i--) {
    const s = streaks[i];
    s.life -= dt / 0.3;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vx *= 0.9; s.vy *= 0.9;
    if (s.life <= 0) streaks.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life) * 0.9;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * Math.max(0.3, p.life), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  for (const s of streaks) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.strokeStyle = s.color;
    ctx.lineCap = 'round';
    ctx.lineWidth = 3;
    const dir = Math.atan2(s.vy, s.vx);
    const ex = s.x + Math.cos(dir) * s.len * s.life;
    const ey = s.y + Math.sin(dir) * s.len * s.life;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y); ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.restore();
  }
}

// ============ 점수 팝업 ============
const scorePopups = [];
function spawnScorePopup(x, y, text, combo) {
  scorePopups.push({ x, y, text, life: 1, combo: !!combo });
  if (scorePopups.length > 20) scorePopups.shift();
}
function updatePopups(dt) {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.life -= dt / 1.1;
    p.y -= 60 * dt;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}
function drawPopups() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const p of scorePopups) {
    const a = Math.max(0, p.life);
    const size = p.combo ? 26 : 20;
    ctx.font = `bold ${size}px -apple-system, "Malgun Gothic", sans-serif`;
    ctx.globalAlpha = a;
    ctx.lineWidth = 4;
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.fillStyle = p.combo ? '#ffd54f' : '#ffffff';
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.restore();
}

// ============ 콤보 ============
let comboCount = 0;
let lastMergeTime = 0;
const COMBO_WINDOW_MS = 1200;
function registerCombo() {
  const now = performance.now();
  if (now - lastMergeTime < COMBO_WINDOW_MS) comboCount++;
  else comboCount = 1;
  lastMergeTime = now;
}
function comboMultiplier() {
  if (comboCount <= 1) return 1;
  return 1 + (comboCount - 1) * 0.5; // 2콤보 1.5x, 3콤보 2x, ...
}
function drawCombo() {
  if (comboCount <= 1) return;
  const elapsed = performance.now() - lastMergeTime;
  if (elapsed > COMBO_WINDOW_MS) { comboCount = 0; return; }
  const a = 1 - elapsed / COMBO_WINDOW_MS;
  ctx.save();
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.font = 'bold 22px -apple-system, "Malgun Gothic", sans-serif';
  ctx.globalAlpha = a;
  ctx.lineWidth = 5;
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.fillStyle = '#ffde59';
  const txt = `${comboCount} COMBO! x${comboMultiplier().toFixed(1)}`;
  const x = 14, y = H * 0.28;
  ctx.strokeText(txt, x, y);
  ctx.fillText(txt, x, y);
  ctx.restore();
}

// ============ 업적 배너 ============
let achievement = null;
function triggerAchievement(text) {
  achievement = { text, life: 1 };
}
function updateAchievement(dt) {
  if (!achievement) return;
  achievement.life -= dt / 3.0;
  if (achievement.life <= 0) achievement = null;
}
function drawAchievement() {
  if (!achievement) return;
  const a = Math.max(0, achievement.life);
  const progress = 1 - achievement.life;
  // 입장 애니메이션 (첫 0.2초 슬라이드인, 마지막 0.4초 페이드아웃)
  let slideProgress = Math.min(1, progress / 0.1);
  let alpha = a < 0.2 ? a / 0.2 : 1;
  const y = H * 0.4 - (1 - slideProgress) * 40;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 30px -apple-system, "Malgun Gothic", sans-serif';
  ctx.lineWidth = 6;
  ctx.strokeStyle = 'rgba(0,0,0,0.8)';
  // 배경 캡슐
  const txt = achievement.text;
  const metrics = ctx.measureText(txt);
  const pad = 18;
  const w = metrics.width + pad * 2;
  const h = 52;
  const bgGrad = ctx.createLinearGradient(W/2 - w/2, y - h/2, W/2 + w/2, y + h/2);
  bgGrad.addColorStop(0, '#ff9e2c');
  bgGrad.addColorStop(1, '#ffcf4a');
  ctx.fillStyle = bgGrad;
  roundRect(ctx, W/2 - w/2, y - h/2, w, h, 12);
  ctx.fill();
  ctx.strokeStyle = '#7a4a00';
  ctx.lineWidth = 3;
  ctx.stroke();
  // 텍스트
  ctx.fillStyle = '#4a2800';
  ctx.lineWidth = 0;
  ctx.fillText(txt, W/2, y);
  ctx.restore();
}
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

let recordAnnouncedAt = 0;
let lastBestCheck = 0;
function checkRecord() {
  // refreshScore 안에서 자동 best 갱신되므로, 배너는 과거 기록 넘어갈 때만 한 번
  if (score > lastBestCheck && score >= best && performance.now() - recordAnnouncedAt > 2500) {
    recordAnnouncedAt = performance.now();

  }

// ============ 점수 틱업 ============
let displayScore = 0;
function tickDisplayScore() {
  if (displayScore === score) return;
  const diff = score - displayScore;
  const step = Math.max(1, Math.ceil(Math.abs(diff) * 0.12));
  displayScore += diff > 0 ? step : -step;
  if ((diff > 0 && displayScore > score) || (diff < 0 && displayScore < score)) displayScore = score;
  document.getElementById('score').textContent = displayScore.toLocaleString();
}

// ============ 오디오 (SFX) ============
let audioCtx = null;
let soundOn = true;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}
function playMergeSfx(tier) {
  if (!soundOn) return;
  const ac = getAudio();
  if (!ac) return;
  try {
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    const baseFreq = 260 * Math.pow(1.1, tier);
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.6, now + 0.06);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.9, now + 0.22);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.24);
    osc.connect(gain).connect(ac.destination);
    osc.start(now);
    osc.stop(now + 0.26);
  } catch (e) {}
}
function playGameOverSfx() {
  if (!soundOn) return;
  const ac = getAudio();
  if (!ac) return;
  try {
    const now = ac.currentTime;
    const notes = [440, 330, 220];
    notes.forEach((f, i) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, now + i * 0.18);
      g.gain.linearRampToValueAtTime(0.2, now + i * 0.18 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.3);
      osc.connect(g).connect(ac.destination);
      osc.start(now + i * 0.18);
      osc.stop(now + i * 0.18 + 0.32);
    });
  } catch (e) {}
}

// ============ BGM (Web Audio 합성 — 파일 불필요) ============
const bgm = { playing: false, nextTime: 0, step: 0, masterGain: null, pad: null, padGain: null };
// C장조 계열의 밝은 아르페지오 16비트 루프
const BGM_MELODY = [
  // C major arpeggio
  261.63, 329.63, 392.00, 523.25,
  329.63, 523.25, 392.00, 329.63,
  // A minor (relative)
  220.00, 261.63, 329.63, 523.25,
  329.63, 261.63, 220.00, 329.63,
  // F major
  174.61, 261.63, 349.23, 523.25,
  261.63, 349.23, 523.25, 349.23,
  // G major (resolve)
  196.00, 246.94, 293.66, 392.00,
  246.94, 293.66, 392.00, 293.66,
];
const BGM_BASS = [
  65.41,  65.41,  65.41,  65.41, // C2
  65.41,  65.41,  65.41,  65.41,
  55.00,  55.00,  55.00,  55.00, // A1
  55.00,  55.00,  55.00,  55.00,
  43.65,  43.65,  43.65,  43.65, // F1
  43.65,  43.65,  43.65,  43.65,
  49.00,  49.00,  49.00,  49.00, // G1
  49.00,  49.00,  49.00,  49.00,
];
const BGM_STEP_DUR = 0.28; // 각 노트 길이 (초)

function startBgm() {
  if (bgm.playing) return;
  const ac = getAudio();
  if (!ac) return;
  bgm.playing = true;
  // 마스터 게인 (부드럽게 페이드인)
  bgm.masterGain = ac.createGain();
  bgm.masterGain.gain.setValueAtTime(0, ac.currentTime);
  bgm.masterGain.gain.linearRampToValueAtTime(0.35, ac.currentTime + 1.2);
  bgm.masterGain.connect(ac.destination);
  // 지속 저음 패드 (낮은 드론)
  bgm.pad = ac.createOscillator();
  bgm.pad.type = 'sine';
  bgm.pad.frequency.value = 65.41; // C2
  bgm.padGain = ac.createGain();
  bgm.padGain.gain.value = 0.06;
  bgm.pad.connect(bgm.padGain).connect(bgm.masterGain);
  bgm.pad.start();
  bgm.step = 0;
  bgm.nextTime = ac.currentTime + 0.1;
  bgmScheduler();
}

function stopBgm() {
  if (!bgm.playing) return;
  bgm.playing = false;
  const ac = getAudio();
  if (ac && bgm.masterGain) {
    const t = ac.currentTime;
    try {
      bgm.masterGain.gain.cancelScheduledValues(t);
      bgm.masterGain.gain.setValueAtTime(bgm.masterGain.gain.value, t);
      bgm.masterGain.gain.linearRampToValueAtTime(0, t + 0.4);
    } catch (e) {}
  }
  const pad = bgm.pad;
  const mg = bgm.masterGain;
  setTimeout(() => {
    try { if (pad) pad.stop(); } catch (e) {}
    try { if (mg) mg.disconnect(); } catch (e) {}
  }, 500);
  bgm.pad = null;
  bgm.padGain = null;
  bgm.masterGain = null;
}

function bgmScheduler() {
  if (!bgm.playing) return;
  const ac = getAudio();
  if (!ac) { bgm.playing = false; return; }
  const lookAhead = 0.3;
  const danger = Math.max(0, Math.min(1, window.__lineDanger || 0));
  // 위험도에 따라 템포 최대 35% 빨라짐
  const stepDur = BGM_STEP_DUR * (1 - danger * 0.35);
  const pitchMul = 1 + danger * 0.15; // 살짝 높아짐
  while (bgm.nextTime < ac.currentTime + lookAhead) {
    const idx = bgm.step % BGM_MELODY.length;
    scheduleBgmNote(BGM_MELODY[idx] * pitchMul, bgm.nextTime, stepDur * 0.85, 'triangle', 0.07);
    if (bgm.step % 4 === 0) {
      scheduleBgmNote(BGM_BASS[idx] * pitchMul, bgm.nextTime, stepDur * 3.5, 'sine', 0.05);
    }
    bgm.step++;
    bgm.nextTime += stepDur;
  }
  setTimeout(bgmScheduler, 80);
}

function scheduleBgmNote(freq, startTime, duration, type, vol) {
  const ac = getAudio();
  if (!ac || !bgm.masterGain) return;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  // ADSR 스타일 엔벨로프
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(vol, startTime + 0.015);
  g.gain.linearRampToValueAtTime(vol * 0.7, startTime + duration * 0.3);
  g.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  osc.connect(g).connect(bgm.masterGain);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.02);
}

// ============ 스크린 셰이크 / 슬로우모션 / 플래시 ============
let shakeAmount = 0;
let shakeDecay = 0;
let slowMoFactor = 1;
let slowMoTimer = 0;
let flashAlpha = 0;

function triggerShake(strength, duration) {
  shakeAmount = Math.max(shakeAmount, strength);
  shakeDecay = Math.max(shakeDecay, duration);
}
function triggerSlowMo(factor, duration) {
  slowMoFactor = factor;
  slowMoTimer = duration;
}
function triggerFlash(alpha) {
  flashAlpha = Math.max(flashAlpha, alpha);
}
function updateEffects(dt) {
  if (shakeDecay > 0) {
    shakeDecay -= dt;
    if (shakeDecay <= 0) { shakeDecay = 0; shakeAmount = 0; }
  }
  if (slowMoTimer > 0) {
    slowMoTimer -= dt;
    if (slowMoTimer <= 0) { slowMoTimer = 0; slowMoFactor = 1; }
  }
  if (flashAlpha > 0) {
    flashAlpha = Math.max(0, flashAlpha - dt * 2);
  }
}
function applyShake() {
  if (shakeAmount <= 0) return;
  const intensity = shakeAmount * (shakeDecay > 0 ? 1 : 0);
  const sx = (Math.random() - 0.5) * intensity * 2;
  const sy = (Math.random() - 0.5) * intensity * 2;
  ctx.translate(sx, sy);
}
function drawFlash() {
  if (flashAlpha <= 0) return;
  ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
  ctx.fillRect(0, 0, W, H);
}

// ============ 위험 비네트 ============
function drawDangerVignette() {
  const danger = Math.max(0, Math.min(1, window.__lineDanger || 0));
  if (danger < 0.05) return;
  const pulse = 0.7 + Math.sin(performance.now() / 140) * 0.3 * danger;
  const cx = W / 2, cy = H / 2;
  const inner = Math.min(W, H) * 0.35;
  const outer = Math.max(W, H) * 0.85;
  const grad = ctx.createRadialGradient(cx, cy, inner, cx, cy, outer);
  grad.addColorStop(0, 'rgba(255,0,0,0)');
  grad.addColorStop(0.6, `rgba(255,30,30,${danger * 0.25 * pulse})`);
  grad.addColorStop(1, `rgba(255,0,0,${danger * 0.55 * pulse})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ============ 햅틱 ============
function haptic(kind) {
  try {
    if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) {
      const h = Telegram.WebApp.HapticFeedback;
      if (kind === 'merge') h.impactOccurred('light');
      else if (kind === 'big') h.impactOccurred('medium');
      else if (kind === 'gameover') h.notificationOccurred('error');
      return;
    }
  } catch (e) {}
  try {
    if (navigator.vibrate) {
      if (kind === 'merge') navigator.vibrate(15);
      else if (kind === 'big') navigator.vibrate([30, 20, 30]);
      else if (kind === 'gameover') navigator.vibrate([60, 40, 60, 40, 100]);
    }
  } catch (e) {}
}

// 흙 알갱이 고정 위치 (깜빡임 방지)
const SOIL_SPECKS = [
  [0.04, 0.22, 'dark', 1.6],  [0.08, 0.65, 'light', 1.3], [0.13, 0.40, 'mid', 1.4],
  [0.18, 0.78, 'dark', 1.5],  [0.22, 0.30, 'light', 1.2], [0.27, 0.55, 'mid', 1.5],
  [0.33, 0.20, 'dark', 1.4],  [0.37, 0.75, 'light', 1.6], [0.42, 0.45, 'mid', 1.3],
  [0.48, 0.65, 'dark', 1.5],  [0.52, 0.28, 'mid', 1.4],   [0.57, 0.80, 'light', 1.2],
  [0.63, 0.40, 'dark', 1.6],  [0.68, 0.60, 'mid', 1.3],   [0.73, 0.25, 'light', 1.5],
  [0.78, 0.75, 'dark', 1.4],  [0.82, 0.35, 'mid', 1.6],   [0.87, 0.55, 'light', 1.3],
  [0.92, 0.22, 'dark', 1.5],  [0.96, 0.68, 'mid', 1.4],
];
// 젖은 물 얼룩 반짝이 위치 (고정)
const WET_SPOTS = [[0.15, 0.45], [0.38, 0.55], [0.62, 0.35], [0.85, 0.6]];

function drawGround() {
  const fy = H - SAFE_BOTTOM;
  // 불투명 젖은 흙 베이스 (진한 갈색 그라데이션)
  const g = ctx.createLinearGradient(0, fy, 0, H);
  g.addColorStop(0, '#5a3f26');
  g.addColorStop(0.18, '#4a3018');
  g.addColorStop(0.55, '#38220f');
  g.addColorStop(1, '#1f1007');
  ctx.fillStyle = g;
  ctx.fillRect(0, fy, W, SAFE_BOTTOM);

  // 젖은 상단 윤기 (얇은 하이라이트 밴드)
  const shine = ctx.createLinearGradient(0, fy, 0, fy + 8);
  shine.addColorStop(0, 'rgba(180,140,90,0.45)');
  shine.addColorStop(1, 'rgba(180,140,90,0)');
  ctx.fillStyle = shine;
  ctx.fillRect(0, fy, W, 8);

  // 젖은 물 얼룩 (반사광 패치)
  for (const [sx, sy] of WET_SPOTS) {
    const px = sx * W, py = fy + sy * SAFE_BOTTOM;
    const ws = ctx.createRadialGradient(px, py - 2, 0, px, py, 14);
    ws.addColorStop(0, 'rgba(210,170,120,0.35)');
    ws.addColorStop(0.5, 'rgba(180,140,90,0.15)');
    ws.addColorStop(1, 'rgba(180,140,90,0)');
    ctx.fillStyle = ws;
    ctx.beginPath();
    ctx.ellipse(px, py, 18, 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 흙 알갱이 (어두운+밝은 점 혼합)
  for (const [sx, sy, type, size] of SOIL_SPECKS) {
    const px = sx * W, py = fy + sy * SAFE_BOTTOM;
    if (type === 'light') ctx.fillStyle = 'rgba(140,100,60,0.7)';
    else if (type === 'dark') ctx.fillStyle = 'rgba(10,5,2,0.7)';
    else ctx.fillStyle = 'rgba(70,45,25,0.75)';
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // 지면 상단 경계 (뚜렷한 흙 라인)
  ctx.strokeStyle = 'rgba(100,70,40,0.9)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, fy); ctx.lineTo(W, fy);
  ctx.stroke();
}

function drawLine() {
  const danger = Math.max(0, Math.min(1, window.__lineDanger || 0));
  ctx.save();

  // 위험 시 위아래로 번지는 빨간 글로우 밴드 (부드럽게)
  if (danger > 0.05) {
    const glow = ctx.createLinearGradient(0, LINE_Y - 24, 0, LINE_Y + 24);
    glow.addColorStop(0, 'rgba(255, 60, 60, 0)');
    glow.addColorStop(0.5, `rgba(255, 60, 60, ${0.5 * danger})`);
    glow.addColorStop(1, 'rgba(255, 60, 60, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, LINE_Y - 24, W, 48);
  }

  // 메인 점선 (기본 흰색 반투명, 위험 시 빨강)
  const isRed = danger > 0.3;
  const mainColor = isRed
    ? `rgba(255, 95, 95, ${0.85 + danger * 0.15})`
    : 'rgba(255, 255, 255, 0.72)';
  ctx.strokeStyle = mainColor;
  ctx.lineWidth = 2.4;
  ctx.lineCap = 'round';
  ctx.setLineDash([12, 7]);
  ctx.beginPath();
  ctx.moveTo(10, LINE_Y);
  ctx.lineTo(W - 10, LINE_Y);
  ctx.stroke();
  ctx.setLineDash([]);

  // 양 끝 나무매듭 앵커
  const knotColor = isRed ? '#c62828' : '#5a3818';
  const knotHi    = isRed ? '#ef5350' : '#8a6838';
  [8, W - 8].forEach((ax) => {
    ctx.fillStyle = knotColor;
    ctx.beginPath();
    ctx.arc(ax, LINE_Y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = knotHi;
    ctx.beginPath();
    ctx.arc(ax - 1.2, LINE_Y - 1.2, 1.6, 0, Math.PI * 2);
    ctx.fill();
  });

  // 위험도 높을 때 중앙에 작은 경고 아이콘 (⚠ 느낌의 점)
  if (danger > 0.5) {
    ctx.fillStyle = `rgba(255, 230, 60, ${danger})`;
    const cx = W / 2;
    ctx.beginPath();
    ctx.arc(cx, LINE_Y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// 공통: 제거 불가 등급 과일에 빨간 X 표시
function drawForbiddenX(f) {
  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
  ctx.fill();
  const s = f.r * 0.55;
  ctx.strokeStyle = '#ff3030';
  ctx.lineWidth = Math.max(4, f.r * 0.1);
  ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(f.x - s, f.y - s); ctx.lineTo(f.x + s, f.y + s);
  ctx.moveTo(f.x + s, f.y - s); ctx.lineTo(f.x - s, f.y + s);
  ctx.stroke();
  ctx.restore();
}

// 물약 모드 — 진화 불가(파인애플 이상)에 X, 진화 가능에 보라 펄스
function drawPotionOverlay() {
  const pulse = 0.7 + Math.sin(performance.now() / 180) * 0.3;
  for (const f of fruits) {
    if (f.dead) continue;
    if (f.tier > POTION_MAX_TIER) {
      drawForbiddenX(f);
    } else {
      ctx.save();
      ctx.strokeStyle = `rgba(180, 100, 255, ${0.55 * pulse})`;
      ctx.lineWidth = Math.max(2, f.r * 0.05);
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r + 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

// 이어하기 선택 모드 — 제거 불가(멜론/감자)에 X, 제거 가능에 빨간 펄스 + 남은 개수 표시
function drawReviveOverlay() {
  const pulse = 0.7 + Math.sin(performance.now() / 180) * 0.3;
  for (const f of fruits) {
    if (f.dead) continue;
    if (f.tier > REVIVE_MAX_TIER) {
      drawForbiddenX(f);
    } else {
      ctx.save();
      ctx.strokeStyle = `rgba(255, 90, 90, ${0.55 * pulse})`;
      ctx.lineWidth = Math.max(2, f.r * 0.05);
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r + 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }
  // 남은 선택 수 HUD
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.font = 'bold 24px "Jua", sans-serif';
  ctx.fillStyle = '#ff5252';
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = 5;
  const txt = `${reviveRemaining}개 더 선택`;
  ctx.strokeText(txt, W / 2, LINE_Y + 20);
  ctx.fillText(txt, W / 2, LINE_Y + 20);
  ctx.restore();
}

// 떨어질 위치에 희미한 원 그림자 표시 (점선 없음)
function drawDropShadow() {
  if (!canDrop || gameOver) return;
  const r = TIERS[currentTier].r;
  const x = Math.max(r + 4, Math.min(W - r - 4, previewX));
  // 바닥 근처에 예상 랜딩 위치: 간단히 x축만 표시
  const floorY = H - SAFE_BOTTOM;
  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x, floorY - 4, r * 0.7, r * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPops() {
  for (const p of pops) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life) * 0.6;
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ============ 메인 루프 ============
let lastT = performance.now();
let frameCount = 0;
let fpsTimer = 0, fps = 0;

function loop(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05;

  // 슬로우모션 적용된 물리 델타
  const physDt = dt * slowMoFactor;

  if (!gameOver && !paused && !reviveMode) {
    const sub = 3;
    const sdt = physDt / sub;
    for (let i = 0; i < sub; i++) physicsStep(sdt);
    checkGameOver();
  }
  updatePops(dt);
  updateParticles(dt);
  updatePopups(dt);
  updateAchievement(dt);
  updateEffects(dt);
  refreshScore();     // 보드 상태로 score 재계산
  tickDisplayScore(); // 표시용 점수 부드럽게 보간

  ctx.clearRect(0, 0, W, H);

  // 스크린 셰이크 적용
  ctx.save();
  applyShake();

  drawBackground();
  drawGround();
  drawLine();
  for (const f of fruits) drawFruit(f);
  drawParticles();
  drawPops();
  if (potionMode) drawPotionOverlay();
  else if (reviveMode) drawReviveOverlay();
  drawDropShadow();
  if (!potionMode && !reviveMode) drawPreview();
  drawPopups();

  ctx.restore();

  // 위험 비네트 (셰이크 영향 X)
  drawDangerVignette();
  // 플래시 (위에 덮어씀)
  drawFlash();
  // HUD성 오버레이
  drawCombo();
  drawAchievement();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
