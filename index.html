<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>수박 합성</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden; background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    color: #fff; touch-action: none;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: linear-gradient(180deg, #2a5f6b 0%, #4a8a76 55%, #6fb27a 100%);
    overflow: hidden; cursor: pointer;
  }
  /* PC 미리보기 (큰 화면)에서만 모바일 프레임 */
  @media (min-width: 500px) {
    body { display: flex; align-items: center; justify-content: center; }
    #wrap {
      width: min(420px, calc(100vh * 9 / 16));
      height: min(747px, 100vh);
      width: min(420px, calc(100dvh * 9 / 16));
      height: min(747px, 100dvh);
      border-radius: 28px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.55),
        0 0 0 4px #111,
        inset 0 0 0 1px rgba(255,255,255,0.06);
    }
  }
  canvas { display: block; position: absolute; inset: 0; pointer-events: none; }
  .hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 5;
  }
  .score-box { font-weight: 800; }
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .score-label { font-size: 12px; opacity: .85; min-width: 40px; }
  .score-value { font-size: 14px; color: #ffde59; }
  .big { font-size: 26px !important; color: #ffb800 !important; text-shadow: 0 2px 0 rgba(0,0,0,.35); }
  .next-box {
    background: rgba(0,0,0,0.25);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 6px 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .next-box span { font-size: 11px; opacity: .85; }
  .next-swatch {
    width: 28px; height: 28px; border-radius: 50%;
    box-shadow: inset -3px -5px 8px rgba(0,0,0,0.25), 0 2px 4px rgba(0,0,0,0.3);
  }
  .overlay {
    position: absolute; inset: 0; z-index: 10;
    background: rgba(0,0,0,0.65);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; backdrop-filter: blur(6px);
  }
  .overlay.show { display: flex; }
  .overlay h2 { margin: 0; font-size: 32px; color: #ffde59; text-shadow: 0 3px 0 #8a5a00; }
  .overlay .final-score { font-size: 22px; }
  .overlay .final-score b { color: #ffb800; font-size: 28px; }
  .btn {
    background: linear-gradient(180deg, #ffcf4a 0%, #ff9e2c 100%);
    border: 3px solid #7a4a00; color: #4a2800;
    padding: 14px 36px; border-radius: 28px;
    font-size: 20px; font-weight: 900;
    cursor: pointer; box-shadow: 0 4px 0 #7a4a00;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #7a4a00; }
  #debug {
    position: absolute; bottom: 8px; left: 8px; font-size: 10px;
    background: rgba(0,0,0,0.55); color: #9ff; padding: 3px 6px; border-radius: 6px;
    z-index: 99; pointer-events: none; font-family: monospace;
  }
  #testBtn {
    position: absolute; top: 10px; right: 12px; z-index: 20;
    background: rgba(0,0,0,0.55); color: #fff; border: 1px solid #fff6;
    padding: 5px 10px; border-radius: 14px; font-size: 11px; font-weight: 700;
    cursor: pointer;
  }
  #testBtn:active { background: rgba(0,0,0,0.8); }
  #muteBtn {
    position: absolute; top: 80px; right: 12px; z-index: 20;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: #fff; border: 1px solid #fff6;
    font-size: 16px; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #muteBtn:active { background: rgba(0,0,0,0.8); }
  .tutorial-overlay {
    position: absolute; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.7);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .tutorial-overlay.show { display: flex; }
  .tutorial-card {
    background: linear-gradient(180deg, #fff5d5 0%, #ffdc7a 100%);
    border: 4px solid #8a5a00;
    border-radius: 20px;
    padding: 24px 28px;
    max-width: 80%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
    color: #3a2000;
  }
  .tutorial-card h2 { margin: 0 0 16px; font-size: 26px; color: #8a3a00; }
  .tutorial-card p { margin: 10px 0; font-size: 15px; font-weight: 600; line-height: 1.5; }
  .tutorial-card button {
    margin-top: 16px;
    background: linear-gradient(180deg, #ffcf4a 0%, #ff9e2c 100%);
    border: 3px solid #7a4a00; color: #4a2800;
    padding: 10px 28px; border-radius: 22px;
    font-size: 16px; font-weight: 900;
    cursor: pointer; box-shadow: 0 3px 0 #7a4a00;
  }
  .tutorial-card button:active { transform: translateY(1px); box-shadow: 0 2px 0 #7a4a00; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="score-box">
      <div class="score-row"><span class="score-label">P</span><span class="score-value big" id="score">0</span></div>
      <div class="score-row"><span class="score-label">최고P</span><span class="score-value" id="best">0</span></div>
    </div>
  </div>

  <div class="tutorial-overlay" id="tutorial">
    <div class="tutorial-card">
      <h2>🍉 수박 합성</h2>
      <p>👆 화면을 탭해서 과일을 떨어뜨려요</p>
      <p>🍒 같은 과일 2개가 만나면 다음 단계로 합쳐져요</p>
      <p>🏆 마지막엔 감자를 만들어 최고 점수 갱신!</p>
      <p>🚨 빨간 선 위로 쌓이지 않게 조심</p>
      <button id="tutorialClose">시작하기</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <h2>게임 오버</h2>
    <div class="final-score">점수 <b id="finalScore">0</b></div>
    <button class="btn" id="restartBtn">다시 도전</button>
  </div>

  <button id="testBtn">전체 과일 테스트</button>
  <button id="muteBtn" title="소리 켜기/끄기">🔊</button>
  <div id="debug">loading…</div>
</div>

<script>
"use strict";

// 전역 에러 표시 (원인 파악용)
window.addEventListener('error', (ev) => {
  const d = document.getElementById('debug');
  if (d) { d.style.background = '#a00'; d.style.color = '#fff'; d.textContent = 'ERR: ' + (ev.message || ev.error); }
});

// 안전한 localStorage 래퍼 (sandboxed iframe 대비)
const safeStorage = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
};

// ============ Telegram (선택) ============
try {
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }
} catch (e) {}

// 스크립트 시작 확인용
try { document.getElementById('debug').textContent = 'init…'; } catch(e) {}

// ============ 과일 정의 ============
const TIERS = [
  { name: '체리',     color: '#D32F2F', r: 14,  face: 'smile'  },                          // 1단계: 빨강
  { name: '딸기',     color: '#FFEB3B', r: 20,  face: 'grin'   },                          // 2단계: 노랑 (빨강·보라와 완전 다른 계열)
  { name: '포도',     color: '#7B1FA2', r: 28,  face: 'wink-r' },                          // 3단계: 보라
  { name: '귤',       color: '#FB8C00', r: 37,  face: 'blush'  },                          // 4단계: 주황
  { name: '감',       color: '#C2185B', r: 47,  face: 'happy'  },                          // 5단계: 딥 라즈베리
  { name: '사과',     color: '#43A047', r: 58,  face: 'cat'    },                          // 초록 (청사과)
  { name: '배',       color: '#DCE775', color2: '#F9A825', r: 70,  face: 'tongue' },       // 연두→골드 (배 느낌)
  { name: '복숭아',   color: '#FF7043', color2: '#FDD835', r: 82,  face: 'blush'  },       // 산호→노랑 (석양)
  { name: '파인애플', color: '#FFD54F', color2: '#E65100', r: 94,  face: 'smug'   },       // 노랑→진주황
  { name: '멜론',     color: '#9CCC65', color2: '#F06292', r: 106, face: 'wink-l' },       // 연두→핫핑크
  { name: '감자',     color: '#8D6E63', color2: '#EF6C00', r: 118, face: 'stoic'  },       // 갈색→주황
];

// ============ 캔버스 / 렌더링 셋업 ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
const dbg = document.getElementById('debug');

// 실제 화면 크기 그대로 사용 (초기 버전 방식)
let W = 0, H = 0, LINE_Y = 0;
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  const wrapEl = document.getElementById('wrap');
  const rect = wrapEl.getBoundingClientRect();
  W = rect.width || window.innerWidth;
  H = rect.height || window.innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  LINE_Y = Math.max(100, Math.min(H * 0.2, 180));
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
resize();
requestAnimationFrame(resize); // CSS 적용 후 한 번 더
try {
  if ('ResizeObserver' in window) {
    new ResizeObserver(resize).observe(document.getElementById('wrap'));
  }
} catch (e) {}

// ============ 자체 물리 엔진 ============
const GRAVITY = 1800;     // px/s²
const RESTITUTION = 0;    // 반발력 (거의 제거)
const WALL_REST = 0.02;
const WALL_FRICTION = 0.5; // 벽/바닥 마찰
const LINEAR_DAMP = 0.97;  // 선속도 감쇠 강화 (미끄러짐 감소)
const ANG_DAMP = 0.86;     // 각속도 감쇠 강화
const CONTACT_FRICTION = 0.45; // 과일끼리 접선 마찰
// 핸드폰 하단 곡률/홈 인디케이터 안전 영역 (논리 좌표)
const SAFE_BOTTOM = 70;
const SAFE_SIDE = 22; // 나무 트렁크 두께와 일치

let nextId = 1;
function Fruit(x, y, tier) {
  const r = TIERS[tier].r;
  const mass = Math.pow(r, 3.5);
  return {
    id: nextId++,
    x, y, vx: 0, vy: 0,
    angle: 0, va: 0,
    tier, r,
    mass, invMass: 1 / mass,
    createdAt: performance.now(),
    overLineAt: 0,
    dead: false,
    merged: false,
    squashTime: 0,   // 0이면 정상, >0이면 애니메이션 중
    faceState: 0,    // 0=기본, 1=놀람(낙하중), 2=기쁨(합체직후)
    faceTimer: 0,
    groundedTick: 0, // 바닥/다른 과일 접촉 프레임 수
  };
}

const fruits = [];

function physicsStep(dt) {
  // 중력 + 적분
  for (const f of fruits) {
    if (f.dead) continue;
    f.vy += GRAVITY * dt;
    f.vx *= LINEAR_DAMP;
    f.va *= ANG_DAMP;
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.angle += f.va * dt;
    if (f.squashTime > 0) {
      f.squashTime = Math.max(0, f.squashTime - dt / 0.22);
    }
  }

  // 벽 충돌 (안전 영역 적용)
  const floorY = H - SAFE_BOTTOM;
  const leftX = SAFE_SIDE;
  const rightX = W - SAFE_SIDE;
  for (const f of fruits) {
    if (f.dead) continue;
    if (f.x - f.r < leftX)   { f.x = leftX + f.r;     f.vx = Math.abs(f.vx) * WALL_REST;  f.vy *= WALL_FRICTION; f.va *= 0.7; }
    if (f.x + f.r > rightX)  { f.x = rightX - f.r;    f.vx = -Math.abs(f.vx) * WALL_REST; f.vy *= WALL_FRICTION; f.va *= 0.6; }
    if (f.y + f.r > floorY)  {
      const impactSpd = f.vy;
      f.y = floorY - f.r;
      f.vy = -Math.abs(f.vy) * WALL_REST;
      f.vx *= WALL_FRICTION; f.va *= 0.6;
      if (impactSpd > 250) {
        f.squashTime = 1;
        if (f.r > 40 && impactSpd > 400) spawnDust(f.x, floorY, f.r * 2);
      }
    }
  }

  // 원-원 충돌 (여러 패스: 낑긴 상태에서도 분리되도록)
  const passes = 4;
  for (let p = 0; p < passes; p++) {
    // 각 패스 시작 시 벽 재확인 (무거운 과일이 가벼운 과일을 벽 밖으로 미는 것 방지)
    for (const f of fruits) {
      if (f.dead) continue;
      if (f.x - f.r < leftX) f.x = leftX + f.r;
      if (f.x + f.r > rightX) f.x = rightX - f.r;
      if (f.y + f.r > floorY) f.y = floorY - f.r;
    }
    for (let i = 0; i < fruits.length; i++) {
      const a = fruits[i];
      if (a.dead) continue;
      for (let j = i + 1; j < fruits.length; j++) {
        const b = fruits[j];
        if (b.dead) continue;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const minD = a.r + b.r;
        const d2 = dx*dx + dy*dy;
        if (d2 >= minD*minD) continue;
        let d = Math.sqrt(d2);
        let nx, ny;
        if (d < 0.0001) { nx = 0; ny = -1; d = 0.0001; }
        else { nx = dx / d; ny = dy / d; }
        const overlap = minD - d;

        // 위치 분리 (질량 가중: 가벼운 쪽이 더 많이 밀림)
        const invSum = a.invMass + b.invMass;
        const aShare = a.invMass / invSum;
        const bShare = b.invMass / invSum;
        a.x -= nx * overlap * aShare;
        a.y -= ny * overlap * aShare;
        b.x += nx * overlap * bShare;
        b.y += ny * overlap * bShare;

        if (p === 0) {
          // 속도 반응 (질량 가중)
          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const vn = rvx * nx + rvy * ny;
          // 착지 감지: a가 위에서 b 위로 떨어짐 (ny > 0.5 = b가 a 아래) OR b가 a 아래서 튕겨 올림
          if (vn < -220) {
            if (ny > 0.55) a.squashTime = 1;
            if (ny < -0.55) b.squashTime = 1;
          }
          if (vn < 0) {
            // 노말 방향 임펄스 (충돌 반발)
            const jimp = -(1 + RESTITUTION) * vn / invSum;
            a.vx -= jimp * a.invMass * nx; a.vy -= jimp * a.invMass * ny;
            b.vx += jimp * b.invMass * nx; b.vy += jimp * b.invMass * ny;
            // 탄젠셜 방향 마찰 (미끄러짐 방지)
            const tx = -ny, ty = nx;
            const vt = rvx * tx + rvy * ty;
            const jfric = -vt * CONTACT_FRICTION / invSum;
            a.vx -= jfric * a.invMass * tx; a.vy -= jfric * a.invMass * ty;
            b.vx += jfric * b.invMass * tx; b.vy += jfric * b.invMass * ty;
            // 회전 유발 (작은 과일일수록 많이 돌아감)
            a.va -= vt * a.invMass * 0.03;
            b.va += vt * b.invMass * 0.03;
          }

          // 합체 체크
          if (a.tier === b.tier && !a.merged && !b.merged) {
            a.merged = b.merged = true;
            const mx = (a.x + b.x) * 0.5;
            const my = (a.y + b.y) * 0.5;
            const tIdx = a.tier;
            a.dead = true; b.dead = true;
            if (tIdx < TIERS.length - 1) {
              const resultTier = tIdx + 1;
              const nf = Fruit(mx, my, resultTier);
              nf.vy = -30;
              nf.squashTime = 0.22; // 합체 순간 압축/팽창
              fruits.push(nf);
              // 콤보 적용
              registerCombo();
              const basePts = mergeScore(resultTier);
              const pts = Math.round(basePts * comboMultiplier());
              addScore(pts);
              spawnPop(mx, my, TIERS[resultTier].color, TIERS[resultTier].r);
              spawnBurst(mx, my, TIERS[resultTier].color, Math.min(22, 10 + tIdx * 2));
              spawnStreaks(mx, my, TIERS[resultTier].color, 8 + tIdx);
              spawnScorePopup(mx, my - TIERS[resultTier].r * 0.6, '+' + pts, comboCount > 1);
              playMergeSfx(tIdx);
              haptic(tIdx >= 6 ? 'big' : 'merge');
              checkRecord();
              // 감자(최종) 달성 — 축하 연출
              if (resultTier === TIERS.length - 1) {
                triggerAchievement('🥔 전설의 감자!');
              }
            } else {
              registerCombo();
              const pts = Math.round(500 * comboMultiplier());
              addScore(pts);
              spawnPop(mx, my, TIERS[tIdx].color, TIERS[tIdx].r * 1.6);
              spawnBurst(mx, my, TIERS[tIdx].color, 60);
              spawnStreaks(mx, my, '#ffde59', 16);
              spawnScorePopup(mx, my - TIERS[tIdx].r * 0.5, '+' + pts + ' BONUS!', true);
              playMergeSfx(tIdx);
              haptic('big');
              checkRecord();
              triggerAchievement('✨ 감자 콤보!');
            }
          }
        }
      }
    }
  }

  // 죽은 과일 정리
  for (let i = fruits.length - 1; i >= 0; i--) {
    if (fruits[i].dead) fruits.splice(i, 1);
  }
}

// ============ 게임 상태 ============
let score = 0;
let best = parseInt(safeStorage.get('suika_best') || '0', 10);
let gameOver = false;
let canDrop = true;
let previewX = 0;
let currentTier = randomSpawnTier();
let nextTier = randomSpawnTier();

function randomSpawnTier() {
  // 점수에 따른 동적 가중치 (5000점 만점 기준 선형 증가)
  // progress 0:  체리 60 / 딸기 32 / 포도 6  / 귤 2
  // progress 1:  체리 30 / 딸기 28 / 포도 27 / 귤 15
  const progress = Math.min(1, score / 5000);
  const pCherry     = 0.60 - 0.30 * progress;
  const pStrawberry = 0.32 - 0.04 * progress;
  const pGrape      = 0.06 + 0.21 * progress;
  const r = Math.random();
  if (r < pCherry) return 0;
  if (r < pCherry + pStrawberry) return 1;
  if (r < pCherry + pStrawberry + pGrape) return 2;
  return 3;
}
// 점수 공식 (지수 커브: 후반 보상 극대화)
function mergeScore(resultTier) {
  return Math.round(Math.pow(resultTier, 2.3) * 2);
}

function addScore(pts) {
  score += pts;
  // 표시 점수는 tickDisplayScore가 프레임마다 부드럽게 반영
  if (score > best) {
    best = score;
    safeStorage.set('suika_best', String(best));
    document.getElementById('best').textContent = best;
  }
}
document.getElementById('best').textContent = best;

function dropFruit(x) {
  if (!canDrop || gameOver) return;
  const r = TIERS[currentTier].r;
  const cx = Math.max(r + 4, Math.min(W - r - 4, x));
  const cy = Math.max(r + 10, LINE_Y - r - 10);
  fruits.push(Fruit(cx, cy, currentTier));
  currentTier = nextTier;
  nextTier = randomSpawnTier();
  canDrop = false;
  setTimeout(() => { canDrop = true; }, 450);
}

// ============ 입력 (여러 이벤트 안전장치) ============
function getEventX(e) {
  const rect = wrap.getBoundingClientRect();
  let cx;
  if (e.clientX != null) cx = e.clientX;
  else if (e.touches && e.touches[0]) cx = e.touches[0].clientX;
  else if (e.changedTouches && e.changedTouches[0]) cx = e.changedTouches[0].clientX;
  else return null;
  return cx - rect.left;
}

function onMove(e) {
  const x = getEventX(e);
  if (x != null) previewX = x;
}
function onDown(e) {
  if (e.target && e.target.closest && (
    e.target.closest('.btn') ||
    e.target.closest('.overlay.show') ||
    e.target.closest('.tutorial-overlay.show') ||
    e.target.closest('#testBtn') ||
    e.target.closest('#muteBtn') ||
    e.target.closest('#tutorialClose')
  )) return;
  // 튜토리얼 떠 있으면 드롭 금지
  if (document.getElementById('tutorial').classList.contains('show')) return;
  const x = getEventX(e);
  if (x != null) { previewX = x; dropFruit(x); }
  e.preventDefault && e.preventDefault();
}

wrap.addEventListener('pointermove', onMove, { passive: true });
wrap.addEventListener('pointerdown', onDown);
wrap.addEventListener('mousemove', onMove, { passive: true });
wrap.addEventListener('mousedown', onDown);
wrap.addEventListener('touchmove', onMove, { passive: true });
wrap.addEventListener('touchstart', onDown, { passive: false });

// 초기 프리뷰 위치
previewX = W / 2;

// ============ 팝 이펙트 ============
const pops = [];
function spawnPop(x, y, color, r) {
  pops.push({ x, y, r: r * 0.8, maxR: r * 1.9, life: 1, color });
}
function updatePops(dt) {
  for (let i = pops.length - 1; i >= 0; i--) {
    const p = pops[i];
    p.life -= dt / 0.35;
    p.r += (p.maxR - p.r) * 0.2;
    if (p.life <= 0) pops.splice(i, 1);
  }
}

// ============ 게임 오버 체크 ============
const GAME_OVER_MS = 2200; // 과일 상단이 선에 닿은 채 2.2초 (타이트하게)
let paused = false;
let testMode = false; // 전체 과일 테스트 중엔 게임오버 판정 금지

// 탭 백그라운드 / 포커스 잃을 때 일시정지
document.addEventListener('visibilitychange', () => {
  paused = document.hidden;
  if (paused) {
    // 백그라운드 복귀 시 타이머 오인식 방지 — 모든 overLineAt 리셋
    for (const f of fruits) f.overLineAt = 0;
  }
});

function checkGameOver() {
  if (testMode) return; // 테스트 모드는 게임오버 안 걸림
  if (gameOver) return;
  const now = performance.now();
  let anyOver = false;
  for (const f of fruits) {
    if (now - f.createdAt < 300) continue; // 스폰 직후 순간 무시
    const top = f.y - f.r;
    if (top <= LINE_Y) {
      if (!f.overLineAt) f.overLineAt = now;
      anyOver = true;
      if (now - f.overLineAt >= GAME_OVER_MS) { triggerGameOver(); return; }
    } else {
      f.overLineAt = 0;
    }
  }
  // 경고용: 가장 오래 닿아있는 시간을 전역에 저장 (렌더에서 시각화)
  let maxOver = 0;
  if (anyOver) {
    for (const f of fruits) {
      if (f.overLineAt) maxOver = Math.max(maxOver, now - f.overLineAt);
    }
  }
  window.__lineDanger = maxOver / GAME_OVER_MS; // 0~1
}
function triggerGameOver() {
  gameOver = true;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('overlay').classList.add('show');
  playGameOverSfx();
  haptic('gameover');
}

// ============ 렌더링 ============
function shade(hex, amt) {
  const c = hex.replace('#', '');
  let r = parseInt(c.substr(0, 2), 16);
  let g = parseInt(c.substr(2, 2), 16);
  let b = parseInt(c.substr(4, 2), 16);
  r = Math.round(r + (amt > 0 ? (255 - r) * amt : r * amt));
  g = Math.round(g + (amt > 0 ? (255 - g) * amt : g * amt));
  b = Math.round(b + (amt > 0 ? (255 - b) * amt : b * amt));
  return `rgb(${Math.max(0, Math.min(255, r))},${Math.max(0, Math.min(255, g))},${Math.max(0, Math.min(255, b))})`;
}

function drawFace(r, face) {
  const eyeY = r * 0.02;
  const eyeX = r * 0.30;
  const eyeR = Math.max(3, r * 0.14); // 기존 0.07 → 0.14 (2배)
  const mouthY = r * 0.38;
  const mw = r * 0.19;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // 검정 점 눈 (흰자 없음, 참고 사진 스타일)
  const bigEye = (x, y, mod = 1) => {
    const eR = eyeR * mod;
    // 살짝 세로로 갸름한 타원
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(x, y, eR * 0.88, eR * 1.02, 0, 0, Math.PI * 2); ctx.fill();
    // 작은 sparkle 하나만
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x - eR * 0.25, y - eR * 0.3, eR * 0.22, eR * 0.28, -0.3, 0, Math.PI * 2);
    ctx.fill();
  };
  // 윙크 / 감은눈 (⌒ 스마일 커브, 위로 솟음)
  const winkEye = (x, y) => {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = Math.max(2, r * 0.08);
    ctx.beginPath();
    ctx.moveTo(x - eyeR, y + eyeR * 0.2);
    ctx.quadraticCurveTo(x, y - eyeR * 0.95, x + eyeR, y + eyeR * 0.2);
    ctx.stroke();
  };
  // 하트눈
  const heartEye = (x, y) => {
    const s = eyeR * 1.15;
    ctx.fillStyle = '#ff3a5e';
    ctx.beginPath();
    ctx.moveTo(x, y - s * 0.1);
    ctx.bezierCurveTo(x - s * 0.95, y - s * 0.95, x - s * 1.3, y + s * 0.2, x, y + s * 0.95);
    ctx.bezierCurveTo(x + s * 1.3, y + s * 0.2, x + s * 0.95, y - s * 0.95, x, y - s * 0.1);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath();
    ctx.ellipse(x - s * 0.35, y - s * 0.2, s * 0.22, s * 0.14, -0.3, 0, Math.PI * 2);
    ctx.fill();
  };

  // === 눈 ===
  if (face === 'wink-r') {
    bigEye(-eyeX, eyeY);
    winkEye(eyeX, eyeY);
  } else if (face === 'wink-l') {
    winkEye(-eyeX, eyeY);
    bigEye(eyeX, eyeY);
  } else if (face === 'happy') {
    winkEye(-eyeX, eyeY);
    winkEye(eyeX, eyeY);
  } else if (face === 'heart') {
    heartEye(-eyeX, eyeY);
    heartEye(eyeX, eyeY);
  } else if (face === 'surprised') {
    bigEye(-eyeX, eyeY, 1.4);
    bigEye(eyeX, eyeY, 1.4);
  } else if (face === 'stoic') {
    // 수박 보스 느낌: 굵은 눈썹 + 단단한 큰 눈
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = r * 0.1;
    ctx.beginPath();
    ctx.moveTo(-eyeX - eyeR * 1.3, eyeY - eyeR * 1.55);
    ctx.lineTo(-eyeX + eyeR * 0.3, eyeY - eyeR * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(eyeX + eyeR * 1.3, eyeY - eyeR * 1.55);
    ctx.lineTo(eyeX - eyeR * 0.3, eyeY - eyeR * 0.7);
    ctx.stroke();
    bigEye(-eyeX, eyeY + eyeR * 0.1, 1.05);
    bigEye(eyeX, eyeY + eyeR * 0.1, 1.05);
  } else {
    bigEye(-eyeX, eyeY);
    bigEye(eyeX, eyeY);
  }

  // === 입 ===
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = Math.max(1.8, r * 0.065);
  if (face === 'surprised') {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(0, mouthY, mw * 0.55, mw * 0.8, 0, 0, Math.PI * 2); ctx.fill();
  } else if (face === 'grin') {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(0, mouthY, mw * 1.5, mw * 0.9, 0, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#ff708a';
    ctx.beginPath();
    ctx.ellipse(0, mouthY + mw * 0.6, mw * 0.9, mw * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (face === 'tongue') {
    ctx.beginPath();
    ctx.arc(0, mouthY, mw, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
    ctx.fillStyle = '#ff708a';
    ctx.beginPath();
    ctx.ellipse(mw * 0.35, mouthY + mw * 0.5, mw * 0.5, mw * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (face === 'stoic') {
    ctx.beginPath();
    ctx.moveTo(-mw * 0.7, mouthY + mw * 0.15);
    ctx.lineTo(mw * 0.7, mouthY + mw * 0.15);
    ctx.stroke();
  } else if (face === 'smug') {
    ctx.beginPath();
    ctx.moveTo(-mw * 1.05, mouthY + mw * 0.35);
    ctx.quadraticCurveTo(0, mouthY + mw * 0.7, mw * 1.15, mouthY - mw * 0.25);
    ctx.stroke();
  } else if (face === 'heart') {
    // 살짝 벌린 입 (히죽)
    ctx.beginPath();
    ctx.arc(0, mouthY, mw * 1.1, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
  } else if (face === 'cat') {
    // 고양이 ω 입
    ctx.beginPath();
    ctx.moveTo(-mw * 1.1, mouthY);
    ctx.quadraticCurveTo(-mw * 0.55, mouthY + mw * 0.7, 0, mouthY + mw * 0.1);
    ctx.quadraticCurveTo(mw * 0.55, mouthY + mw * 0.7, mw * 1.1, mouthY);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(0, mouthY, mw, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.stroke();
  }

  // === 볼터치 ===
  if (face === 'blush' || face === 'happy' || face === 'heart') {
    ctx.fillStyle = 'rgba(255,120,140,0.5)';
    ctx.beginPath(); ctx.ellipse(-eyeX - r * 0.1, eyeY + r * 0.25, r * 0.14, r * 0.09, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(eyeX + r * 0.1, eyeY + r * 0.25, r * 0.14, r * 0.09, 0, 0, Math.PI * 2); ctx.fill();
  }
}

function drawFruit(f, alpha) {
  const t = TIERS[f.tier];
  const r = f.r;
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.angle);
  if (alpha != null) ctx.globalAlpha = alpha;
  // 착지 스쿼시 (Y압축 + X팽창)
  if (f.squashTime > 0) {
    const s = f.squashTime;
    const squashY = 1 - s * 0.22;
    const stretchX = 1 + s * 0.14;
    ctx.scale(stretchX, squashY);
    // 압축 방향 보정 (아래로 눌림)
    ctx.translate(0, r * (1 - squashY) * 0.5);
  }

  // === 본체 베이스 컬러 ===
  if (t.color2) {
    // 다색 (위→아래 선형)
    const lin = ctx.createLinearGradient(0, -r, 0, r);
    lin.addColorStop(0, shade(t.color, 0.25));
    lin.addColorStop(0.5, t.color);
    lin.addColorStop(1, t.color2);
    ctx.fillStyle = lin;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  } else {
    // 단일색 방사 (더 강한 대비)
    const grad = ctx.createRadialGradient(-r * 0.32, -r * 0.36, r * 0.05, 0, 0, r);
    grad.addColorStop(0, shade(t.color, 0.55));
    grad.addColorStop(0.5, t.color);
    grad.addColorStop(1, shade(t.color, -0.32));
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  }

  // === 강한 림 그림자 (가장자리 어둡게 → 3D 입체감) ===
  const rim = ctx.createRadialGradient(0, 0, r * 0.72, 0, 0, r);
  rim.addColorStop(0, 'rgba(0,0,0,0)');
  rim.addColorStop(0.8, 'rgba(0,0,0,0.06)');
  rim.addColorStop(1, 'rgba(0,0,0,0.38)');
  ctx.fillStyle = rim;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

  // === 하단 반사광 (바닥에서 튕기는 빛) ===
  const bot = ctx.createRadialGradient(r * 0.22, r * 0.52, 0, r * 0.22, r * 0.52, r * 0.55);
  bot.addColorStop(0, 'rgba(255,255,255,0.28)');
  bot.addColorStop(0.6, 'rgba(255,255,255,0.08)');
  bot.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = bot;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

  // 과일 이름 (상단 장식 분기에서 사용)
  const n = t.name;

  // === 메인 하이라이트 (좌상단 큰 광택) ===
  const hi = ctx.createRadialGradient(-r * 0.3, -r * 0.4, 0, -r * 0.3, -r * 0.4, r * 0.72);
  hi.addColorStop(0, 'rgba(255,255,255,0.85)');
  hi.addColorStop(0.35, 'rgba(255,255,255,0.35)');
  hi.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hi;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

  // === 작은 글린트 (강한 흰점 — 비닐감) ===
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.35, -r * 0.42, r * 0.2, r * 0.11, -0.35, 0, Math.PI * 2);
  ctx.fill();
  // 보조 작은 글린트
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.1, -r * 0.55, r * 0.08, r * 0.04, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // 얼굴 (과일별 다른 표정)
  drawFace(r, t.face || 'smile');

  // === 과일별 상단 장식 (꼭지/잎/크라운) ===
  if (n === '체리') {
    // 휘어진 갈색 꼭지 + 잎
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = Math.max(1.5, r * 0.08);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.85);
    ctx.quadraticCurveTo(r * 0.25, -r * 1.15, r * 0.4, -r * 1.22);
    ctx.stroke();
    ctx.save();
    ctx.translate(r * 0.42, -r * 1.18);
    ctx.rotate(-0.3);
    ctx.fillStyle = '#6BAA3F';
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.32, r * 0.14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#3a6a1a';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-r * 0.28, 0); ctx.lineTo(r * 0.28, 0); ctx.stroke();
    ctx.restore();
  } else if (n === '딸기') {
    // 녹색 칼릭스 (뾰족한 잎 왕관)
    ctx.save();
    ctx.translate(0, -r * 0.85);
    const leafColors = ['#3d8a28', '#4a9a33', '#58ab3e'];
    for (let i = -2; i <= 2; i++) {
      const ang = i * 0.35;
      const len = r * (0.4 + (Math.abs(i) === 1 ? 0.05 : 0));
      ctx.save();
      ctx.rotate(ang);
      ctx.fillStyle = leafColors[(i + 2) % leafColors.length];
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(r * 0.15, -len * 0.5, 0, -len);
      ctx.quadraticCurveTo(-r * 0.15, -len * 0.5, 0, 0);
      ctx.fill();
      ctx.strokeStyle = 'rgba(20,50,10,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(0, -len * 0.9);
      ctx.stroke();
      ctx.restore();
    }
    ctx.fillStyle = '#2a5a1a';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.13, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else if (n === '귤' || n === '사과') {
    // 얇은 갈색 꼭지 + 잎
    ctx.strokeStyle = '#4a2e10';
    ctx.lineWidth = Math.max(1.5, r * 0.055);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.92);
    ctx.lineTo(0, -r * 1.12);
    ctx.stroke();
    ctx.save();
    ctx.translate(r * 0.05, -r * 1.05);
    ctx.rotate(-0.5);
    const lg = ctx.createLinearGradient(0, -r * 0.1, 0, r * 0.1);
    lg.addColorStop(0, '#7cc24a');
    lg.addColorStop(1, '#3d7a20');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.ellipse(r * 0.18, 0, r * 0.28, r * 0.13, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a5a10';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-r * 0.05, 0);
    ctx.lineTo(r * 0.35, 0);
    ctx.stroke();
    ctx.restore();
  } else if (n === '감') {
    // 녹색 4엽 꽃받침
    ctx.save();
    ctx.translate(0, -r * 0.85);
    for (let i = 0; i < 4; i++) {
      ctx.save();
      ctx.rotate((i / 4) * Math.PI * 2);
      const pg = ctx.createLinearGradient(0, 0, r * 0.35, 0);
      pg.addColorStop(0, '#4a8225');
      pg.addColorStop(1, '#7ab53d');
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(r * 0.2, -r * 0.05, r * 0.36, r * 0.04);
      ctx.quadraticCurveTo(r * 0.22, r * 0.14, 0, r * 0.08);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#2a4f10';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }
    ctx.fillStyle = '#3a2a10';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.07, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else if (n === '배') {
    // 얇은 꼭지
    ctx.strokeStyle = '#6a4a2a';
    ctx.lineWidth = Math.max(1.2, r * 0.04);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.95);
    ctx.quadraticCurveTo(r * 0.04, -r * 1.06, r * 0.02, -r * 1.18);
    ctx.stroke();
  } else if (n === '복숭아') {
    // 잎 1개
    ctx.save();
    ctx.translate(r * 0.18, -r * 0.85);
    ctx.rotate(-0.65);
    const lg = ctx.createLinearGradient(0, -r * 0.1, 0, r * 0.1);
    lg.addColorStop(0, '#7cc24a');
    lg.addColorStop(1, '#3d7a20');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.35, r * 0.13, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a5a10';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-r * 0.3, 0); ctx.lineTo(r * 0.3, 0);
    ctx.stroke();
    ctx.restore();
  } else if (n === '파인애플') {
    // 뾰족한 녹색 잎 크라운 (5장)
    ctx.save();
    ctx.translate(0, -r * 0.82);
    for (let i = -2; i <= 2; i++) {
      const ang = i * 0.28;
      const len = r * (0.55 - Math.abs(i) * 0.07);
      ctx.save();
      ctx.rotate(ang);
      const grd = ctx.createLinearGradient(0, 0, 0, -len);
      grd.addColorStop(0, '#2a6a18');
      grd.addColorStop(0.5, '#58b23a');
      grd.addColorStop(1, '#8dd460');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(-r * 0.09, 0);
      ctx.quadraticCurveTo(-r * 0.04, -len * 0.5, 0, -len);
      ctx.quadraticCurveTo(r * 0.04, -len * 0.5, r * 0.09, 0);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(20,50,10,0.55)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // 중앙 잎맥
      ctx.strokeStyle = 'rgba(20,50,10,0.35)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(0, -len * 0.9);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  } else if (n === '멜론') {
    // 짧은 꼭지 + 작은 잎
    ctx.strokeStyle = '#3a6a1a';
    ctx.lineWidth = Math.max(1.5, r * 0.05);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.96);
    ctx.quadraticCurveTo(r * 0.08, -r * 1.04, r * 0.15, -r * 1.1);
    ctx.stroke();
    ctx.save();
    ctx.translate(r * 0.2, -r * 1.02);
    ctx.rotate(0.35);
    const lg = ctx.createLinearGradient(0, -r * 0.1, 0, r * 0.1);
    lg.addColorStop(0, '#7cc24a');
    lg.addColorStop(1, '#3d7a20');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.22, r * 0.09, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

// ============ 배경 장식 (정적 부분은 오프스크린 캐싱) ============
let bgCache = null;
let bgCacheW = 0, bgCacheH = 0;
function ensureBgCache() {
  if (bgCache && bgCacheW === Math.floor(W) && bgCacheH === Math.floor(H)) return;
  bgCacheW = Math.floor(W);
  bgCacheH = Math.floor(H);
  bgCache = document.createElement('canvas');
  bgCache.width = Math.floor(W * DPR);
  bgCache.height = Math.floor(H * DPR);
  const bc = bgCache.getContext('2d');
  bc.scale(DPR, DPR);
  drawStaticBackground(bc);
}

function drawStaticBackground(c) {
  // 좌우 나무 트렁크
  const trunkW = 22;
  const lg = c.createLinearGradient(0, 0, trunkW, 0);
  lg.addColorStop(0, '#2d1a08'); lg.addColorStop(0.5, '#5a3818'); lg.addColorStop(1, '#3d2510');
  c.fillStyle = lg; c.fillRect(0, 0, trunkW, H);
  const rg = c.createLinearGradient(W - trunkW, 0, W, 0);
  rg.addColorStop(0, '#3d2510'); rg.addColorStop(0.5, '#5a3818'); rg.addColorStop(1, '#2d1a08');
  c.fillStyle = rg; c.fillRect(W - trunkW, 0, trunkW, H);
  c.strokeStyle = 'rgba(0,0,0,0.35)'; c.lineWidth = 1;
  for (let y = 0; y < H; y += 14) {
    c.beginPath(); c.moveTo(5, y); c.lineTo(7, y + 10); c.stroke();
    c.beginPath(); c.moveTo(14, y + 7); c.lineTo(16, y + 17); c.stroke();
    c.beginPath(); c.moveTo(W - 17, y); c.lineTo(W - 15, y + 10); c.stroke();
    c.beginPath(); c.moveTo(W - 8, y + 7); c.lineTo(W - 6, y + 17); c.stroke();
  }
  // 덩굴 줄기 (정적)
  c.strokeStyle = 'rgba(70,130,45,0.7)'; c.lineWidth = 2;
  c.beginPath();
  c.moveTo(28, 0);
  c.quadraticCurveTo(45, 40, 32, 90);
  c.quadraticCurveTo(22, 130, 38, 170);
  c.stroke();
  c.beginPath();
  c.moveTo(W - 28, 0);
  c.quadraticCurveTo(W - 48, 50, W - 32, 100);
  c.quadraticCurveTo(W - 20, 150, W - 38, 190);
  c.stroke();
}

function drawBackground() {
  ensureBgCache();
  // 캐시된 정적 배경 한 번에 복사
  ctx.drawImage(bgCache, 0, 0, W, H);
  // 흔들리는 잎사귀 (동적)
  const t = performance.now() / 1000;
  const sway1 = Math.sin(t * 0.8) * 0.06;
  const sway2 = Math.sin(t * 0.6 + 1.2) * 0.05;
  drawLeafCluster(18, 35, 55, -0.35 + sway1, 0);
  drawLeafCluster(W - 18, 38, 52, Math.PI + 0.3 + sway2, 1);
  drawLeafCluster(W * 0.25, 8, 38, -0.5 + sway1 * 1.3, 2);
  drawLeafCluster(W * 0.78, 12, 42, 0.6 + sway2 * 1.2, 0);
  // 덩굴 끝 잎
  drawSmallLeaf(38 + Math.sin(t * 1.1) * 2, 170, -0.3);
  drawSmallLeaf(W - 38 - Math.sin(t * 0.9) * 2, 190, 0.3 + Math.PI);
}

function drawLeafCluster(cx, cy, size, tilt, seed) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(tilt);
  const palette = ['#1e4a10', '#2d6a20', '#4a9030', '#3d7a28'];
  const leaves = [
    { x: -size * 0.45, y: 0, w: size * 0.9, h: size * 0.45, a: -0.3, c: 0 },
    { x: size * 0.1, y: -size * 0.2, w: size * 0.85, h: size * 0.4, a: -0.1, c: 1 },
    { x: size * 0.35, y: size * 0.1, w: size * 0.75, h: size * 0.38, a: 0.35, c: 2 },
    { x: 0, y: size * 0.25, w: size * 1.0, h: size * 0.5, a: 0.1, c: 3 },
    { x: -size * 0.2, y: size * 0.35, w: size * 0.7, h: size * 0.35, a: 0.55, c: 1 },
  ];
  for (const L of leaves) {
    ctx.save();
    ctx.translate(L.x, L.y);
    ctx.rotate(L.a);
    const lg2 = ctx.createLinearGradient(-L.w, 0, L.w, 0);
    const base = palette[(L.c + seed) % palette.length];
    lg2.addColorStop(0, shade(base, -0.2));
    lg2.addColorStop(0.5, base);
    lg2.addColorStop(1, shade(base, 0.25));
    ctx.fillStyle = lg2;
    ctx.beginPath();
    ctx.ellipse(0, 0, L.w, L.h, 0, 0, Math.PI * 2);
    ctx.fill();
    // 잎맥
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-L.w * 0.9, 0); ctx.lineTo(L.w * 0.9, 0);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function drawSmallLeaf(x, y, tilt) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);
  const lg = ctx.createLinearGradient(-12, 0, 12, 0);
  lg.addColorStop(0, '#2d6a20');
  lg.addColorStop(1, '#58b23a');
  ctx.fillStyle = lg;
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-10, 0); ctx.lineTo(10, 0);
  ctx.stroke();
  ctx.restore();
}

// ============ 파티클 (상한 적용) ============
const PARTICLE_CAP = 250;
const particles = [];
function spawnBurst(x, y, color, count) {
  count = count || 14;
  for (let i = 0; i < count; i++) {
    if (particles.length >= PARTICLE_CAP) particles.shift();
    const a = (i / count) * Math.PI * 2 + Math.random() * 0.5;
    const sp = 120 + Math.random() * 200;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 40,
      life: 1,
      color,
      size: 3 + Math.random() * 3,
      kind: 'burst',
    });
  }
}
// 방사형 라이트 스트릭 (짧은 선)
const streaks = [];
function spawnStreaks(x, y, color, count) {
  count = count || 8;
  for (let i = 0; i < count; i++) {
    if (streaks.length >= 60) streaks.shift();
    const a = (i / count) * Math.PI * 2 + Math.random() * 0.3;
    const sp = 220 + Math.random() * 160;
    streaks.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, color, len: 14 + Math.random() * 8,
    });
  }
}
// 착지 먼지
function spawnDust(x, y, size) {
  const count = 4 + Math.floor(size / 20);
  for (let i = 0; i < count; i++) {
    if (particles.length >= PARTICLE_CAP) particles.shift();
    const a = (Math.random() - 0.5) * Math.PI + Math.PI; // 아래쪽
    const sp = 40 + Math.random() * 80;
    particles.push({
      x: x + (Math.random() - 0.5) * size * 0.4,
      y, vx: Math.cos(a - 0.5 + Math.random()) * sp * (Math.random() < 0.5 ? -1 : 1),
      vy: -Math.abs(Math.cos(a) * sp) * 0.3,
      life: 1, color: 'rgba(140,100,60,0.6)',
      size: 3 + Math.random() * 4, kind: 'dust',
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt / (p.kind === 'dust' ? 0.55 : 0.7);
    p.vy += (p.kind === 'dust' ? 150 : 700) * dt;
    p.vx *= 0.98;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = streaks.length - 1; i >= 0; i--) {
    const s = streaks[i];
    s.life -= dt / 0.3;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vx *= 0.9; s.vy *= 0.9;
    if (s.life <= 0) streaks.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life) * 0.9;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * Math.max(0.3, p.life), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  for (const s of streaks) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.strokeStyle = s.color;
    ctx.lineCap = 'round';
    ctx.lineWidth = 3;
    const dir = Math.atan2(s.vy, s.vx);
    const ex = s.x + Math.cos(dir) * s.len * s.life;
    const ey = s.y + Math.sin(dir) * s.len * s.life;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y); ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.restore();
  }
}

// ============ 점수 팝업 ============
const scorePopups = [];
function spawnScorePopup(x, y, text, combo) {
  scorePopups.push({ x, y, text, life: 1, combo: !!combo });

function updatePopups(dt) {

function drawPopups() {
  ctx.save();

  ctx.textBaseline = 'middle';
  for (const p of scorePopups) {

// ============ 콤보 ============
let comboCount = 0;
let lastMergeTime = 0;
const COMBO_WINDOW_MS = 1200;
function registerCombo() {
  const now = performance.now();
  if (now - lastMergeTime < COMBO_WINDOW_MS) comboCount++;
  else comboCount = 1;
  lastMergeTime = now;
}
function comboMultiplier() {
  if (comboCount <= 1) return 1;
  return 1 + (comboCount - 1) * 0.5; // 2콤보 1.5x, 3콤보 2x, ...
}
function drawCombo() {
  if (comboCount <= 1) return;
  const elapsed = performance.now() - lastMergeTime;
  if (elapsed > COMBO_WINDOW_MS) { comboCount = 0; return; }
  const a = 1 - elapsed / COMBO_WINDOW_MS;
  ctx.save();
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.font = 'bold 22px -apple-system, "Malgun Gothic", sans-serif';
  ctx.globalAlpha = a;
  ctx.lineWidth = 5;
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.fillStyle = '#ffde59';
  const txt = `${comboCount} COMBO! x${comboMultiplier().toFixed(1)}`;
  const x = 14, y = H * 0.28;
  ctx.strokeText(txt, x, y);
  ctx.fillText(txt, x, y);
  ctx.restore();
}

// ============ 업적 배너 ============
let achievement = null;
function triggerAchievement(text) {
  achievement = { text, life: 1 };
}
function updateAchievement(dt) {
  if (!achievement) return;
  achievement.life -= dt / 3.0;
  if (achievement.life <= 0) achievement = null;
}
function drawAchievement() {
  if (!achievement) return;
  const a = Math.max(0, achievement.life);
  const progress = 1 - achievement.life;
  // 입장 애니메이션 (첫 0.2초 슬라이드인, 마지막 0.4초 페이드아웃)
  let slideProgress = Math.min(1, progress / 0.1);
  let alpha = a < 0.2 ? a / 0.2 : 1;
  const y = H * 0.4 - (1 - slideProgress) * 40;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 30px -apple-system, "Malgun Gothic", sans-serif';
  ctx.lineWidth = 6;
  ctx.strokeStyle = 'rgba(0,0,0,0.8)';
  // 배경 캡슐
  const txt = achievement.text;
  const metrics = ctx.measureText(txt);
  const pad = 18;
  const w = metrics.width + pad * 2;
  const h = 52;
  const bgGrad = ctx.createLinearGradient(W/2 - w/2, y - h/2, W/2 + w/2, y + h/2);
  bgGrad.addColorStop(0, '#ff9e2c');
  bgGrad.addColorStop(1, '#ffcf4a');
  ctx.fillStyle = bgGrad;
  roundRect(ctx, W/2 - w/2, y - h/2, w, h, 12);
  ctx.fill();
  ctx.strokeStyle = '#7a4a00';
  ctx.lineWidth = 3;
  ctx.stroke();
  // 텍스트
  ctx.fillStyle = '#4a2800';
  ctx.lineWidth = 0;
  ctx.fillText(txt, W/2, y);
  ctx.restore();
}
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ============ 신기록 체크 ============
let recordAnnouncedAt = 0;
function checkRecord() {
  if (score > best && performance.now() - recordAnnouncedAt > 2500) {
    recordAnnouncedAt = performance.now();
    triggerAchievement('🏆 최고 점수 갱신!');
  }
}

// ============ 점수 틱업 ============
let displayScore = 0;
function tickDisplayScore() {
  if (displayScore === score) return;
  const diff = score - displayScore;
  const step = Math.max(1, Math.ceil(Math.abs(diff) * 0.12));
  displayScore += diff > 0 ? step : -step;
  if ((diff > 0 && displayScore > score) || (diff < 0 && displayScore < score)) displayScore = score;
  document.getElementById('score').textContent = displayScore;
}

// ============ 오디오 (SFX) ============
let audioCtx = null;
let soundOn = true;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}
function playMergeSfx(tier) {
  if (!soundOn) return;
  const ac = getAudio();
  if (!ac) return;
  try {
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    const baseFreq = 260 * Math.pow(1.1, tier);
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.6, now + 0.06);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.9, now + 0.22);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.24);
    osc.connect(gain).connect(ac.destination);
    osc.start(now);
    osc.stop(now + 0.26);
  } catch (e) {}
}
function playGameOverSfx() {
  if (!soundOn) return;
  const ac = getAudio();
  if (!ac) return;
  try {
    const now = ac.currentTime;
    const notes = [440, 330, 220];
    notes.forEach((f, i) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, now + i * 0.18);
      g.gain.linearRampToValueAtTime(0.2, now + i * 0.18 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.3);
      osc.connect(g).connect(ac.destination);
      osc.start(now + i * 0.18);
      osc.stop(now + i * 0.18 + 0.32);
    });
  } catch (e) {}
}

  // F major
  174.61, 261.63, 349.23, 523.25,
  261.63, 349.23, 523.25, 349.23,
  // G major (resolve)
  196.00, 246.94, 293.66, 392.00,
  246.94, 293.66, 392.00, 293.66,
];
const BGM_BASS = [
  65.41,  65.41,  65.41,  65.41, // C2
  65.41,  65.41,  65.41,  65.41,
  55.00,  55.00,  55.00,  55.00, // A1
  55.00,  55.00,  55.00,  55.00,
  43.65,  43.65,  43.65,  43.65, // F1
  43.65,  43.65,  43.65,  43.65,
  49.00,  49.00,  49.00,  49.00, // G1
  49.00,  49.00,  49.00,  49.00,
];
const BGM_STEP_DUR = 0.28; // 각 노트 길이 (초)

function startBgm() {
  if (bgm.playing) return;
  const ac = getAudio();
  if (!ac) return;
  bgm.playing = true;
  // 마스터 게인 (부드럽게 페이드인)
  bgm.masterGain = ac.createGain();
  bgm.masterGain.gain.setValueAtTime(0, ac.currentTime);
  bgm.masterGain.gain.linearRampToValueAtTime(0.35, ac.currentTime + 1.2);
  bgm.masterGain.connect(ac.destination);
  // 지속 저음 패드 (낮은 드론)
  bgm.pad = ac.createOscillator();
  bgm.pad.type = 'sine';
  bgm.pad.frequency.value = 65.41; // C2
  bgm.padGain = ac.createGain();
  bgm.padGain.gain.value = 0.06;
  bgm.pad.connect(bgm.padGain).connect(bgm.masterGain);
  bgm.pad.start();
  bgm.step = 0;
  bgm.nextTime = ac.currentTime + 0.1;
  bgmScheduler();
}

function stopBgm() {
  if (!bgm.playing) return;
  bgm.playing = false;
  const ac = getAudio();
  if (ac && bgm.masterGain) {
    const t = ac.currentTime;
    try {
      bgm.masterGain.gain.cancelScheduledValues(t);
      bgm.masterGain.gain.setValueAtTime(bgm.masterGain.gain.value, t);
      bgm.masterGain.gain.linearRampToValueAtTime(0, t + 0.4);
    } catch (e) {}
  }
  const pad = bgm.pad;
  const mg = bgm.masterGain;
  setTimeout(() => {
    try { if (pad) pad.stop(); } catch (e) {}
    try { if (mg) mg.disconnect(); } catch (e) {}
  }, 500);
  bgm.pad = null;
  bgm.padGain = null;
  bgm.masterGain = null;
}

function bgmScheduler() {
  if (!bgm.playing) return;
  const ac = getAudio();
  if (!ac) { bgm.playing = false; return; }
  // 0.3초 앞까지 예약
  const lookAhead = 0.3;
  while (bgm.nextTime < ac.currentTime + lookAhead) {
    const idx = bgm.step % BGM_MELODY.length;
    scheduleBgmNote(BGM_MELODY[idx], bgm.nextTime, BGM_STEP_DUR * 0.85, 'triangle', 0.07);
    // 매 4스텝마다 베이스 노트
    if (bgm.step % 4 === 0) {
      scheduleBgmNote(BGM_BASS[idx], bgm.nextTime, BGM_STEP_DUR * 3.5, 'sine', 0.05);
    }
    bgm.step++;
    bgm.nextTime += BGM_STEP_DUR;
  }
  setTimeout(bgmScheduler, 80);
}

function scheduleBgmNote(freq, startTime, duration, type, vol) {
  const ac = getAudio();
  if (!ac || !bgm.masterGain) return;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  // ADSR 스타일 엔벨로프
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(vol, startTime + 0.015);
  g.gain.linearRampToValueAtTime(vol * 0.7, startTime + duration * 0.3);
  g.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  osc.connect(g).connect(bgm.masterGain);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.02);
}

// ============ 햅틱 ============
function haptic(kind) {
  try {
    if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) {
      const h = Telegram.WebApp.HapticFeedback;
      if (kind === 'merge') h.impactOccurred('light');
      else if (kind === 'big') h.impactOccurred('medium');
      else if (kind === 'gameover') h.notificationOccurred('error');
      return;
    }
  } catch (e) {}
  try {
    if (navigator.vibrate) {
      if (kind === 'merge') navigator.vibrate(15);
      else if (kind === 'big') navigator.vibrate([30, 20, 30]);
      else if (kind === 'gameover') navigator.vibrate([60, 40, 60, 40, 100]);
    }
  } catch (e) {}
}

// 첫 상호작용(터치/버튼/키)에서 오디오 언락 + BGM 시작
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  getAudio();
  if (soundOn) startBgm();
}
window.addEventListener('pointerdown', unlockAudio);
window.addEventListener('touchstart', unlockAudio);
window.addEventListener('click', unlockAudio);

// 흙 알갱이 고정 위치 (깜빡임 방지)
const SOIL_SPECKS = [
  [0.04, 0.22, 'dark', 1.6],  [0.08, 0.65, 'light', 1.3], [0.13, 0.40, 'mid', 1.4],
  [0.18, 0.78, 'dark', 1.5],  [0.22, 0.30, 'light', 1.2], [0.27, 0.55, 'mid', 1.5],
  [0.33, 0.20, 'dark', 1.4],  [0.37, 0.75, 'light', 1.6], [0.42, 0.45, 'mid', 1.3],
  [0.48, 0.65, 'dark', 1.5],  [0.52, 0.28, 'mid', 1.4],   [0.57, 0.80, 'light', 1.2],
  [0.63, 0.40, 'dark', 1.6],  [0.68, 0.60, 'mid', 1.3],   [0.73, 0.25, 'light', 1.5],
  [0.78, 0.75, 'dark', 1.4],  [0.82, 0.35, 'mid', 1.6],   [0.87, 0.55, 'light', 1.3],
  [0.92, 0.22, 'dark', 1.5],  [0.96, 0.68, 'mid', 1.4],
];
// 젖은 물 얼룩 반짝이 위치 (고정)
const WET_SPOTS = [[0.15, 0.45], [0.38, 0.55], [0.62, 0.35], [0.85, 0.6]];

function drawGround() {
  const fy = H - SAFE_BOTTOM;
  // 불투명 젖은 흙 베이스 (진한 갈색 그라데이션)
  const g = ctx.createLinearGradient(0, fy, 0, H);
  g.addColorStop(0, '#5a3f26');
  g.addColorStop(0.18, '#4a3018');
  g.addColorStop(0.55, '#38220f');
  g.addColorStop(1, '#1f1007');
  ctx.fillStyle = g;
  ctx.fillRect(0, fy, W, SAFE_BOTTOM);

  // 젖은 상단 윤기 (얇은 하이라이트 밴드)
  const shine = ctx.createLinearGradient(0, fy, 0, fy + 8);
  shine.addColorStop(0, 'rgba(180,140,90,0.45)');
  shine.addColorStop(1, 'rgba(180,140,90,0)');
  ctx.fillStyle = shine;
  ctx.fillRect(0, fy, W, 8);

  // 젖은 물 얼룩 (반사광 패치)
  for (const [sx, sy] of WET_SPOTS) {
    const px = sx * W, py = fy + sy * SAFE_BOTTOM;
    const ws = ctx.createRadialGradient(px, py - 2, 0, px, py, 14);
    ws.addColorStop(0, 'rgba(210,170,120,0.35)');
    ws.addColorStop(0.5, 'rgba(180,140,90,0.15)');
    ws.addColorStop(1, 'rgba(180,140,90,0)');
    ctx.fillStyle = ws;
    ctx.beginPath();
    ctx.ellipse(px, py, 18, 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 흙 알갱이 (어두운+밝은 점 혼합)
  for (const [sx, sy, type, size] of SOIL_SPECKS) {
    const px = sx * W, py = fy + sy * SAFE_BOTTOM;
    if (type === 'light') ctx.fillStyle = 'rgba(140,100,60,0.7)';
    else if (type === 'dark') ctx.fillStyle = 'rgba(10,5,2,0.7)';
    else ctx.fillStyle = 'rgba(70,45,25,0.75)';
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // 지면 상단 경계 (뚜렷한 흙 라인)
  ctx.strokeStyle = 'rgba(100,70,40,0.9)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, fy); ctx.lineTo(W, fy);
  ctx.stroke();
}

function drawLine() {
  const danger = Math.max(0, Math.min(1, window.__lineDanger || 0));
  ctx.save();

  // 위험 시 위아래로 번지는 빨간 글로우 밴드 (부드럽게)
  if (danger > 0.05) {
    const glow = ctx.createLinearGradient(0, LINE_Y - 24, 0, LINE_Y + 24);
    glow.addColorStop(0, 'rgba(255, 60, 60, 0)');
    glow.addColorStop(0.5, `rgba(255, 60, 60, ${0.5 * danger})`);
    glow.addColorStop(1, 'rgba(255, 60, 60, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, LINE_Y - 24, W, 48);
  }

  // 메인 점선 (기본 흰색 반투명, 위험 시 빨강)
  const isRed = danger > 0.3;
  const mainColor = isRed
    ? `rgba(255, 95, 95, ${0.85 + danger * 0.15})`
    : 'rgba(255, 255, 255, 0.72)';
  ctx.strokeStyle = mainColor;
  ctx.lineWidth = 2.4;
  ctx.lineCap = 'round';
  ctx.setLineDash([12, 7]);
  ctx.beginPath();
  ctx.moveTo(10, LINE_Y);
  ctx.lineTo(W - 10, LINE_Y);
  ctx.stroke();
  ctx.setLineDash([]);

  // 양 끝 나무매듭 앵커
  const knotColor = isRed ? '#c62828' : '#5a3818';
  const knotHi    = isRed ? '#ef5350' : '#8a6838';
  [8, W - 8].forEach((ax) => {
    ctx.fillStyle = knotColor;
    ctx.beginPath();
    ctx.arc(ax, LINE_Y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = knotHi;
    ctx.beginPath();
    ctx.arc(ax - 1.2, LINE_Y - 1.2, 1.6, 0, Math.PI * 2);
    ctx.fill();
  });

  // 위험도 높을 때 중앙에 작은 경고 아이콘 (⚠ 느낌의 점)
  if (danger > 0.5) {
    ctx.fillStyle = `rgba(255, 230, 60, ${danger})`;
    const cx = W / 2;
    ctx.beginPath();
    ctx.arc(cx, LINE_Y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawPreview() {
  if (!canDrop || gameOver) return;
  const r = TIERS[currentTier].r;
  const x = Math.max(r + 4, Math.min(W - r - 4, previewX));
  // 프리뷰 과일 살짝 상하 부유
  const bob = Math.sin(performance.now() / 300) * 2;
  const y = Math.max(r + 10, LINE_Y - r - 14) + bob;
  drawFruit({ x, y, angle: 0, r, tier: currentTier }, 0.9);
}

// 떨어질 위치에 희미한 원 그림자 표시 (점선 없음)
function drawDropShadow() {
  if (!canDrop || gameOver) return;
  const r = TIERS[currentTier].r;
  const x = Math.max(r + 4, Math.min(W - r - 4, previewX));
  // 바닥 근처에 예상 랜딩 위치: 간단히 x축만 표시
  const floorY = H - SAFE_BOTTOM;
  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x, floorY - 4, r * 0.7, r * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPops() {
  for (const p of pops) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life) * 0.6;
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ============ 메인 루프 ============
let lastT = performance.now();
let frameCount = 0;
let fpsTimer = 0, fps = 0;

function loop(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05;

  if (!gameOver && !paused) {
    const sub = 3;
    const sdt = dt / sub;
    for (let i = 0; i < sub; i++) physicsStep(sdt);
    checkGameOver();
  }
  updatePops(dt);
  updateParticles(dt);
  updatePopups(dt);
  updateAchievement(dt);
  tickDisplayScore();

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawGround();
  drawLine();
  for (const f of fruits) drawFruit(f);
  drawParticles();
  drawPops();
  drawDropShadow();
  drawPreview();
  drawPopups();
  drawCombo();
  drawAchievement();

  frameCount++;
  fpsTimer += dt;
  if (fpsTimer >= 0.5) {
    fps = Math.round(frameCount / fpsTimer);
    dbg.textContent = `${W}×${H} · FPS ${fps} · 과일 ${fruits.length} · LINE ${LINE_Y.toFixed(0)}`;
    frameCount = 0; fpsTimer = 0;
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
